<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__SKILL_NAME_PLACEHOLDER__ — Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:     #09090B;
      --s1:     #111113;
      --s2:     #18181B;
      --s3:     #1E1E22;
      --b1:     #27272A;
      --b2:     #3F3F46;
      --text:   #FAFAFA;
      --t2:     #A1A1AA;
      --t3:     #71717A;
      --t4:     #3F3F46;
      --with:   #60A5FA;
      --without:#F87171;
      --pass:   #4ADE80;
      --pass-d: rgba(74,222,128,0.1);
      --fail:   #F87171;
      --fail-d: rgba(248,113,113,0.1);
      --warn:   #FBBF24;
      --mono:   'Geist Mono', 'SF Mono', monospace;
      --rad:    6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--b1); border-radius: 4px; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
      font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .app-header {
      height: 48px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 20px; gap: 14px;
      border-bottom: 1px solid var(--b1);
      background: var(--s1); z-index: 20;
    }
    .header-skill {
      font-family: var(--mono); font-size: 12px; color: var(--t2);
      background: var(--s2); border: 1px solid var(--b1);
      padding: 3px 10px; border-radius: var(--rad);
    }
    .header-sep { width: 1px; height: 16px; background: var(--b1); }
    #save-status { font-family: var(--mono); font-size: 11px; color: var(--pass); min-width: 60px; }
    .header-spacer { flex: 1; }
    .tab-nav { display: flex; align-items: center; gap: 2px; }
    .tab-nav button {
      background: none; border: 1px solid transparent;
      font-family: 'Geist', sans-serif; font-size: 13px;
      color: var(--t3); padding: 5px 14px; border-radius: var(--rad);
      cursor: pointer; transition: all 100ms;
    }
    .tab-nav button:hover { color: var(--t2); background: var(--s2); }
    .tab-nav button.active { color: var(--text); background: var(--s2); border-color: var(--b1); }

    /* LAYOUT */
    .app-body { display: flex; flex: 1; overflow: hidden; position: relative; }
    .tab-panel { display: flex; flex: 1; overflow: hidden; }
    .tab-panel.hidden { display: none !important; }
    .outputs-panel { display: flex; }

    #sidebar {
      width: 224px; flex-shrink: 0;
      border-right: 1px solid var(--b1);
      overflow-y: auto; background: var(--s1);
      display: flex; flex-direction: column;
    }
    .sidebar-label {
      font-size: 11px; font-weight: 500; color: var(--t3);
      padding: 14px 16px 10px; flex-shrink: 0;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; cursor: pointer;
      transition: background 80ms; position: relative;
    }
    .sidebar-item:hover { background: var(--s2); }
    .sidebar-item.active { background: var(--s3); }
    .sidebar-item.active::before {
      content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
      width: 2px; background: var(--with); border-radius: 0 2px 2px 0;
    }
    .sbi-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-pass { background: var(--pass); }
    .dot-fail { background: var(--fail); }
    .dot-neutral { background: var(--t4); }
    .sbi-name { flex: 1; font-size: 12px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-item.active .sbi-name { color: var(--text); font-weight: 500; }
    .sbi-pr { font-family: var(--mono); font-size: 10px; flex-shrink: 0; padding: 1px 6px; border-radius: 99px; border: 1px solid; }
    .pr-100 { color: var(--pass); border-color: rgba(74,222,128,0.25); }
    .pr-mid { color: var(--warn); border-color: rgba(251,191,36,0.25); }
    .pr-low { color: var(--fail); border-color: rgba(248,113,113,0.25); }

    #main-content { flex: 1; overflow-y: auto; padding: 28px 36px 80px; }

    .eval-header { margin-bottom: 24px; }
    #eval-name { font-family: var(--mono); font-size: 11px; color: var(--t3); letter-spacing: 0.04em; margin-bottom: 6px; }
    #eval-prompt { font-size: 13px; color: var(--t2); line-height: 1.6; }
    #eval-prompt p { margin-bottom: 6px; }

    /* STATS */
    #stats-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .stat-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px; border: 1px solid var(--b1);
      border-radius: var(--rad); background: var(--s1);
    }
    .stat-lbl { font-family: var(--mono); font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-val { font-family: var(--mono); font-size: 12px; color: var(--t2); font-weight: 500; }
    .stat-chip.delta-pos { border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.05); }
    .stat-chip.delta-neg { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.05); }
    .delta-pos { color: var(--fail); }
    .delta-neg { color: var(--pass); }

    /* TABLE */
    .compare-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
    .compare-table th {
      text-align: left; padding: 10px 14px;
      font-size: 11px; font-weight: 500; color: var(--t3);
      border-bottom: 1px solid var(--b1);
    }
    .th-assertion { width: 50%; }
    .col-with { color: var(--with) !important; }
    .col-without { color: var(--without) !important; }
    @keyframes assertIn { from { opacity: 0; } to { opacity: 1; } }
    .tr-assert { animation: assertIn 150ms both; }
    .tr-assert:hover .td-text, .tr-assert:hover .td-result { background: var(--s1); }
    .td-text { padding: 10px 14px; border-bottom: 1px solid var(--b1); font-size: 13px; color: var(--t2); vertical-align: top; line-height: 1.5; }
    .td-result { padding: 10px 14px; border-bottom: 1px solid var(--b1); vertical-align: top; width: 18%; }
    .td-pass .res-icon { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; color: var(--pass); }
    .td-fail .res-icon { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--fail); }
    .td-na .res-icon { font-size: 12px; color: var(--t4); }
    .res-ev { font-size: 11px; color: var(--t3); margin-top: 5px; line-height: 1.5; }
    .tr-metric td { padding: 9px 14px; border-bottom: 1px solid var(--b1); }
    .td-metric-lbl { font-size: 11px; font-weight: 500; color: var(--t3); }
    .td-metric { font-family: var(--mono); font-size: 12px; color: var(--t2); }
    .td-metric .delta-pos, .td-metric .delta-neg { font-size: 11px; margin-left: 6px; }

    /* OUTPUTS */
    .outputs-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
    .out-lbl { font-size: 11px; color: var(--t3); font-weight: 500; }
    .out-sep { width: 1px; height: 16px; background: var(--b1); }
    .output-btn {
      background: var(--s1); border: 1px solid var(--b1); color: var(--t2);
      font-family: var(--mono); font-size: 11px; padding: 4px 10px;
      border-radius: var(--rad); cursor: pointer; transition: all 100ms;
    }
    .output-btn:hover { background: var(--s2); color: var(--text); border-color: var(--b2); }

    /* SECTIONS */
    .section-block { margin-bottom: 24px; }
    .section-hdr {
      font-size: 12px; font-weight: 500; color: var(--t3);
      padding: 10px 0; border-top: 1px solid var(--b1);
      display: flex; align-items: center; justify-content: space-between;
    }
    .collapsible-toggle { cursor: pointer; transition: color 100ms; }
    .collapsible-toggle:hover { color: var(--t2); }
    .arrow { font-size: 10px; }
    .collapsible { max-height: 0; overflow: hidden; transition: max-height 220ms ease; }
    .collapsible.open { max-height: 4000px; }
    .transcript-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; padding-top: 14px; }
    .col-sub-label { font-size: 11px; font-weight: 500; color: var(--t3); margin-bottom: 10px; }
    .feedback-row { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; padding-top: 12px; }
    .feedback-area {
      width: 100%; background: var(--s1); border: 1px solid var(--b1);
      color: var(--text); font-family: 'Geist', sans-serif; font-size: 13px;
      line-height: 1.6; padding: 10px 12px; resize: none; min-height: 64px; outline: none;
      border-radius: var(--rad); transition: border-color 100ms;
    }
    .feedback-area::placeholder { color: var(--t4); }
    .feedback-area:focus { border-color: var(--b2); }

    /* MARKDOWN */
    .md-render { font-size: 13px; color: var(--t2); line-height: 1.75; }
    .md-render p { margin-bottom: 8px; }
    .md-render p:last-child { margin-bottom: 0; }
    .md-render pre { background: var(--s2); border: 1px solid var(--b1); padding: 12px 14px; border-radius: var(--rad); overflow-x: auto; margin: 8px 0; }
    .md-render code { font-family: var(--mono); font-size: 11px; color: var(--with); }
    .md-render pre code { color: var(--t2); }
    .md-render h1 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; color: var(--text); }
    .md-render h2 { font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    .md-render ul, .md-render ol { padding-left: 18px; margin: 6px 0; }
    .md-render li { margin: 3px 0; }
    .md-render blockquote { border-left: 2px solid var(--b2); padding-left: 12px; color: var(--t3); margin: 8px 0; }
    .empty-state { font-size: 13px; color: var(--t4); padding: 14px 0; }

    /* NAV */
    #nav-bar {
      position: absolute; bottom: 0; left: 224px; right: 0;
      height: 48px; display: flex; align-items: center; justify-content: center;
      gap: 10px; border-top: 1px solid var(--b1); background: var(--s1); z-index: 20;
    }
    #nav-bar.hidden { display: none !important; }
    .nav-btn {
      background: none; border: 1px solid var(--b1);
      font-family: 'Geist', sans-serif; font-size: 13px; color: var(--t2);
      cursor: pointer; padding: 5px 14px; border-radius: var(--rad); transition: all 100ms;
    }
    .nav-btn:hover:not(:disabled) { background: var(--s2); color: var(--text); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    #nav-counter { font-family: var(--mono); font-size: 11px; color: var(--t3); min-width: 48px; text-align: center; }
    .nav-sep { width: 1px; height: 16px; background: var(--b1); }
    .nav-submit {
      background: var(--text); border: none; color: #000;
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; padding: 6px 16px; border-radius: var(--rad); transition: opacity 100ms;
    }
    .nav-submit:hover { opacity: 0.85; }
    .nav-hints { font-family: var(--mono); font-size: 10px; color: var(--t4); }

    /* BENCHMARK */
    #tab-benchmark { overflow-y: auto; padding: 40px 52px; display: block !important; }
    #benchmark-content { max-width: 840px; display: flex; flex-direction: column; gap: 36px; }
    .bk-meta { font-family: var(--mono); font-size: 11px; color: var(--t3); }
    .kpi-grid { display: flex; gap: 12px; flex-wrap: wrap; }
    .kpi-card { flex: 1; min-width: 180px; border: 1px solid var(--b1); border-radius: var(--rad); padding: 18px 20px; display: flex; flex-direction: column; gap: 8px; background: var(--s1); transition: border-color 100ms; }
    .kpi-card:hover { border-color: var(--b2); }
    .kpi-cfg { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--t3); }
    .kpi-tokens { font-family: var(--mono); font-size: 28px; font-weight: 500; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
    .kpi-stats { display: flex; gap: 12px; font-family: var(--mono); font-size: 12px; }
    .kpi-pass { color: var(--pass); }
    .kpi-time { color: var(--t3); }
    .kpi-rating { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .chart-wrap { border: 1px solid var(--b1); border-radius: var(--rad); padding: 18px; height: 200px; position: relative; background: var(--s1); }
    .bk-section { display: flex; flex-direction: column; gap: 12px; }
    .bk-title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t3); }
    .bk-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .bk-table th { text-align: left; padding: 8px 14px; font-size: 11px; font-weight: 500; color: var(--t3); border-bottom: 1px solid var(--b1); }
    .bk-table td { padding: 10px 14px; border-bottom: 1px solid var(--b1); vertical-align: middle; }
    .bk-table tr:last-child td { border-bottom: none; }
    .bk-table tr:hover td { background: var(--s1); }
    .bk-label { color: var(--t2) !important; font-size: 13px; }
    .bk-std { color: var(--t3); font-family: var(--mono); font-size: 11px; }
    .rating-badge { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 99px; }
    .rating-excellent, .rating-efficace { background: var(--pass-d); color: var(--pass); }
    .rating-neutre, .rating-moderate { background: rgba(251,191,36,0.1); color: var(--warn); }
    .rating-couteux, .rating-poor { background: var(--fail-d); color: var(--fail); }
    .notes-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .notes-list li { font-size: 13px; color: var(--t2); line-height: 1.6; padding-left: 16px; position: relative; }
    .notes-list li::before { content: '·'; position: absolute; left: 4px; color: var(--t3); }

    /* MODAL */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 40px; backdrop-filter: blur(6px); }
    .modal.hidden { display: none !important; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.97) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-inner { background: var(--s1); border: 1px solid var(--b2); border-radius: 10px; width: 100%; max-width: 860px; max-height: 82vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.7); animation: modalIn 180ms ease both; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; border-bottom: 1px solid var(--b1); flex-shrink: 0; }
    #modal-title { font-family: var(--mono); font-size: 12px; color: var(--t2); }
    .modal-close { background: none; border: none; color: var(--t3); font-size: 14px; cursor: pointer; padding: 4px; border-radius: 4px; transition: all 100ms; }
    .modal-close:hover { color: var(--text); background: var(--s2); }
    #modal-body { overflow-y: auto; flex: 1; padding: 22px; }
    .code-block { font-family: var(--mono); font-size: 12px; color: var(--t2); line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>

  <header class="app-header">
    <span class="header-skill">__SKILL_NAME_PLACEHOLDER__</span>
    <div class="header-sep"></div>
    <span id="save-status"></span>
    <div class="header-spacer"></div>
    <nav class="tab-nav">
      <button data-tab="outputs" onclick="switchTab('outputs')" class="active">Outputs</button>
      <button data-tab="benchmark" onclick="switchTab('benchmark')">Benchmark</button>
    </nav>
  </header>

  <div class="app-body">
    <div id="tab-outputs" class="tab-panel outputs-panel">
      <aside id="sidebar"><div class="sidebar-label">Evaluations</div></aside>
      <div id="main-content">
        <div class="eval-header">
          <div id="eval-name"></div>
          <div id="eval-prompt"></div>
        </div>
        <div id="stats-strip"></div>
        <div id="compare-table-wrap"></div>
        <div id="outputs-section"></div>
        <div class="section-block">
          <div class="section-hdr collapsible-toggle" onclick="toggleSection('tr-section')">Transcripts <span class="arrow">▾</span></div>
          <div class="collapsible" id="tr-section">
            <div class="transcript-cols">
              <div><div class="col-sub-label">with skill</div><div class="md-render" id="transcript-with"></div></div>
              <div><div class="col-sub-label">without skill</div><div class="md-render" id="transcript-without"></div></div>
            </div>
          </div>
        </div>
        <div class="section-block">
          <div class="section-hdr">Feedback</div>
          <div class="feedback-row">
            <div><div class="col-sub-label">with skill</div><textarea class="feedback-area" id="fb-with" placeholder="Notes…" oninput="saveFeedback(this.getAttribute('data-run'),this.value)" data-run=""></textarea></div>
            <div><div class="col-sub-label">without skill</div><textarea class="feedback-area" id="fb-without" placeholder="Notes…" oninput="saveFeedback(this.getAttribute('data-run'),this.value)" data-run=""></textarea></div>
          </div>
        </div>
      </div>
    </div>
    <div id="tab-benchmark" class="tab-panel hidden"><div id="benchmark-content"></div></div>
    <nav id="nav-bar">
      <button id="btn-prev" class="nav-btn" onclick="navigate(-1)">← Précédent</button>
      <span id="nav-counter"></span>
      <button id="btn-next" class="nav-btn" onclick="navigate(1)">Suivant →</button>
      <div class="nav-sep"></div>
      <button class="nav-submit" onclick="submitReviews()">Soumettre</button>
      <div class="nav-sep"></div>
      <span class="nav-hints">j/k · ← → · b</span>
    </nav>
  </div>

  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-inner">
      <div class="modal-header"><span id="modal-title"></span><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;
    const BENCHMARK_DATA = __BENCHMARK_DATA_PLACEHOLDER__;
    const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
    const PREVIOUS_DATA = __PREVIOUS_DATA_PLACEHOLDER__;

    function esc(s){if(s===null||s===undefined)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function renderMd(t){if(!t)return '';if(typeof marked!=='undefined')return marked.parse(t);return '<pre style="white-space:pre-wrap">'+esc(t)+'</pre>';}

    const runOutputsMap={};EVAL_DATA.forEach(r=>{runOutputsMap[r.run_id]=r.outputs_content||{};});

    let modalIsOpen=false;
    function openModal(fn,rid){const c=runOutputsMap[rid]?.[fn]||'(non disponible)';document.getElementById('modal-title').textContent=fn;const b=document.getElementById('modal-body');if(fn.endsWith('.md')){b.innerHTML='<div class="md-render">'+renderMd(c)+'</div>';}else if(fn.endsWith('.json')){try{b.innerHTML='<pre class="code-block">'+esc(JSON.stringify(JSON.parse(c),null,2))+'</pre>';}catch{b.innerHTML='<pre class="code-block">'+esc(c)+'</pre>';}}else{b.innerHTML='<pre class="code-block">'+esc(c)+'</pre>';}document.getElementById('modal').classList.remove('hidden');modalIsOpen=true;}
    function closeModal(){document.getElementById('modal').classList.add('hidden');modalIsOpen=false;}
    function handleModalClick(e){if(e.target.id==='modal')closeModal();}

    function buildEvalGroups(d){const m=new Map();d.forEach(r=>{if(!m.has(r.eval_name))m.set(r.eval_name,{name:r.eval_name,prompt:r.prompt,configs:{}});m.get(r.eval_name).configs[r.configuration]=r;});return Array.from(m.values());}
    const evalGroups=buildEvalGroups(EVAL_DATA);
    let currentEvalIndex=0;
    const feedback={};EVAL_DATA.forEach(r=>{feedback[r.run_id]='';});

    function getPassRate(r){const e=r?.grading?.expectations||[];if(!e.length)return null;return Math.round(e.filter(x=>x.passed).length/e.length*100);}

    function renderStatsStrip(wr,wor){
      const el=document.getElementById('stats-strip');if(!el)return;
      const wt=wr?.timing?.total_tokens||0,wot=wor?.timing?.total_tokens||0;
      const wts=wr?.timing?.total_duration_seconds,wots=wor?.timing?.total_duration_seconds;
      const wPR=getPassRate(wr),woPR=getPassRate(wor);
      let td='',tdCls='';if(wt&&wot){const d=((wt-wot)/wot*100).toFixed(0);td=(d>0?'+':'')+d+'%';tdCls=d>0?'delta-pos':'delta-neg';}
      el.innerHTML=`
        <div class="stat-chip"><span class="stat-lbl">with</span><span class="stat-val">${wt.toLocaleString('fr-FR')} tok</span></div>
        <div class="stat-chip"><span class="stat-lbl">without</span><span class="stat-val">${wot.toLocaleString('fr-FR')} tok</span></div>
        ${td?`<div class="stat-chip ${tdCls}"><span class="stat-lbl">delta</span><span class="stat-val ${tdCls}">${td}</span></div>`:''}
        ${wts||wots?`<div class="stat-chip"><span class="stat-lbl">time</span><span class="stat-val">${wts||'—'}s / ${wots||'—'}s</span></div>`:''}
        ${wPR!==null?`<div class="stat-chip"><span class="stat-lbl">pass rate</span><span class="stat-val">${wPR}% / ${woPR!==null?woPR+'%':'—'}</span></div>`:''}
      `;
    }

    function renderCompareTable(g,wr,wor){
      const el=document.getElementById('compare-table-wrap');if(!el)return;
      const wExp=wr?.grading?.expectations||[],woExp=wor?.grading?.expectations||[];
      const keys=[];const aMap=new Map();
      wExp.forEach(e=>{if(!aMap.has(e.text)){keys.push(e.text);aMap.set(e.text,{with:null,without:null});}aMap.get(e.text).with=e;});
      woExp.forEach(e=>{if(!aMap.has(e.text)){keys.push(e.text);aMap.set(e.text,{with:null,without:null});}aMap.get(e.text).without=e;});
      if(!keys.length){el.innerHTML='<p class="empty-state">Aucune assertion disponible</p>';return;}
      const cols=[];
      if(wr) cols.push({key:'with_skill',run:wr,label:'with skill',cls:'col-with'});
      if(wor) cols.push({key:'without_skill',run:wor,label:'without skill',cls:'col-without'});
      let html=`<table class="compare-table"><thead><tr><th class="th-assertion">Assertion</th>${cols.map(c=>`<th class="th-cfg ${c.cls}">${esc(c.label)}</th>`).join('')}</tr></thead><tbody>`;
      keys.forEach((text,i)=>{
        const row=aMap.get(text);
        html+=`<tr class="tr-assert" style="animation-delay:${i*20}ms"><td class="td-text">${esc(text)}</td>`;
        cols.forEach(c=>{const e=c.key==='with_skill'?row.with:row.without;const cls=e?(e.passed?'td-pass':'td-fail'):'td-na';html+=`<td class="td-result ${cls}"><span class="res-icon">${e?(e.passed?'✓ Pass':'✗ Fail'):'—'}</span>${e?.evidence?`<div class="res-ev">${esc(e.evidence)}</div>`:''}</td>`;});
        html+='</tr>';
      });
      const wt=wr?.timing?.total_tokens||0,wot=wor?.timing?.total_tokens||0;
      let td='',tdCls='';if(wt&&wot){const d=((wt-wot)/wot*100).toFixed(0);td=(d>0?'+':'')+d+'%';tdCls=d>0?'delta-pos':'delta-neg';}
      html+=`<tr class="tr-metric"><td class="td-metric-lbl">Tokens</td>`;
      cols.forEach(c=>{const tok=c.run?.timing?.total_tokens||0;html+=`<td class="td-metric">${tok.toLocaleString('fr-FR')}${c.key==='with_skill'&&td?` <span class="${tdCls}">${td}</span>`:''}</td>`;});
      html+='</tr>';
      const wts=wr?.timing?.total_duration_seconds,wots=wor?.timing?.total_duration_seconds;
      if(wts||wots){html+=`<tr class="tr-metric"><td class="td-metric-lbl">Durée</td>`;cols.forEach(c=>{html+=`<td class="td-metric">${c.run?.timing?.total_duration_seconds||'—'}s</td>`;});html+='</tr>';}
      html+='</tbody></table>';
      el.innerHTML=html;
    }

    function renderCurrentEval(){
      const g=evalGroups[currentEvalIndex];if(!g)return;
      const ne=document.getElementById('eval-name');if(ne)ne.textContent=g.name;
      const pe=document.getElementById('eval-prompt');if(pe)pe.innerHTML=renderMd(g.prompt||'');
      const wr=g.configs['with_skill'],wor=g.configs['without_skill'];
      renderStatsStrip(wr,wor);renderCompareTable(g,wr,wor);
      const os=document.getElementById('outputs-section');
      if(os){const wo=wr?.outputs_list||[],wo2=wor?.outputs_list||[];if(!wo.length&&!wo2.length){os.innerHTML='';}else{let oh='<div class="outputs-row">';if(wo.length){oh+='<span class="out-lbl">with:</span>';wo.forEach(f=>{oh+=`<button class="output-btn" onclick="openModal('${esc(f)}','${esc(wr.run_id)}')">${esc(f)} ↗</button>`;});}if(wo2.length){oh+='<div class="out-sep"></div><span class="out-lbl">without:</span>';wo2.forEach(f=>{oh+=`<button class="output-btn" onclick="openModal('${esc(f)}','${esc(wor.run_id)}')">${esc(f)} ↗</button>`;});}oh+='</div>';os.innerHTML=oh;}}
      const tw=document.getElementById('transcript-with');if(tw)tw.innerHTML=renderMd(wr?.transcript||'');
      const two=document.getElementById('transcript-without');if(two)two.innerHTML=renderMd(wor?.transcript||'');
      const fw=document.getElementById('fb-with');if(fw&&wr){fw.value=feedback[wr.run_id]||'';fw.setAttribute('data-run',wr.run_id);}
      const fwo=document.getElementById('fb-without');if(fwo&&wor){fwo.value=feedback[wor.run_id]||'';fwo.setAttribute('data-run',wor.run_id);}
    }

    function toggleSection(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
    function goToEval(idx){if(idx<0||idx>=evalGroups.length)return;currentEvalIndex=idx;renderCurrentEval();updateSidebar();updateNavBar();const mc=document.getElementById('main-content');if(mc)mc.scrollTop=0;}
    function navigate(d){goToEval(currentEvalIndex+d);}
    function updateNavBar(){const c=document.getElementById('nav-counter');if(c)c.textContent=`${currentEvalIndex+1} / ${evalGroups.length}`;const p=document.getElementById('btn-prev'),n=document.getElementById('btn-next');if(p)p.disabled=currentEvalIndex===0;if(n)n.disabled=currentEvalIndex===evalGroups.length-1;}

    function buildSidebar(){
      const sb=document.getElementById('sidebar');if(!sb)return;
      const label=sb.querySelector('.sidebar-label');
      const items=evalGroups.map((g,i)=>{
        const wPR=getPassRate(g.configs['with_skill']);
        const anyFail=Object.values(g.configs).some(r=>(r?.grading?.expectations||[]).some(x=>!x.passed));
        const allPass=Object.values(g.configs).every(r=>{const e=r?.grading?.expectations||[];return e.length>0&&e.every(x=>x.passed);});
        const dc=allPass?'dot-pass':anyFail?'dot-fail':'dot-neutral';
        const pc=wPR===100?'pr-100':(wPR!==null&&wPR>=60)?'pr-mid':'pr-low';
        return `<div class="sidebar-item ${i===0?'active':''}" id="sbi-${i}" onclick="goToEval(${i})"><span class="sbi-dot ${dc}"></span><span class="sbi-name">${esc(g.name)}</span>${wPR!==null?`<span class="sbi-pr ${pc}">${wPR}%</span>`:''}</div>`;
      }).join('');
      sb.innerHTML='';if(label)sb.appendChild(label);sb.insertAdjacentHTML('beforeend',items);
    }
    function updateSidebar(){evalGroups.forEach((_,i)=>{const el=document.getElementById(`sbi-${i}`);if(el)el.classList.toggle('active',i===currentEvalIndex);});}

    function switchTab(n){['outputs','benchmark'].forEach(t=>{const p=document.getElementById(`tab-${t}`);if(p)p.classList.toggle('hidden',t!==n);const b=document.querySelector(`[data-tab="${t}"]`);if(b)b.classList.toggle('active',t===n);});const nb=document.getElementById('nav-bar');if(nb)nb.classList.toggle('hidden',n!=='outputs');if(n==='benchmark')renderBenchmark();}

    function saveFeedback(id,v){if(!id)return;feedback[id]=v;showStatus('saved');}
    function showStatus(m){const el=document.getElementById('save-status');if(!el)return;el.textContent=m;setTimeout(()=>{el.textContent='';},1500);}
    function submitReviews(){const r=EVAL_DATA.map(run=>({run_id:run.run_id,feedback:feedback[run.run_id]||'',timestamp:new Date().toISOString()}));const b=new Blob([JSON.stringify({reviews:r,status:'complete'},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='feedback.json';a.click();showStatus('exported');}

    let chartsInit=false;
    function renderBenchmark(){
      const bk=BENCHMARK_DATA,el=document.getElementById('benchmark-content');
      if(!bk?.run_summary){if(el)el.innerHTML='<p class="empty-state">Benchmark non disponible.</p>';return;}
      const sum=bk.run_summary,cfgs=Object.keys(sum).filter(k=>k!=='delta');
      const eff=bk.token_efficiency||{},notes=bk.analyst_notes||[],meta=bk.metadata||{};
      let html=`<div class="bk-meta">${esc(meta.skill_name||SKILL_NAME)} · ${esc(meta.executor_model||'—')} · ${esc(meta.timestamp||'—')} · ${(meta.evals_run||[]).length} evals</div>`;
      html+='<div class="kpi-grid">';
      cfgs.forEach(c=>{const s=sum[c]||{};html+=`<div class="kpi-card"><div class="kpi-cfg">${esc(c.replace(/_/g,' '))}</div><div class="kpi-tokens">${Math.round(s.tokens?.mean||0).toLocaleString('fr-FR')}</div><div class="kpi-stats"><span class="kpi-pass">${Math.round((s.pass_rate?.mean||0)*100)}%</span><span class="kpi-time">${(s.time_seconds?.mean||0).toFixed(1)}s</span></div>${eff[c]?`<div class="kpi-rating rating-${esc(eff[c].rating)}">${esc(eff[c].rating)}</div>`:''}</div>`;});
      html+='</div>';
      html+=`<div class="charts-row"><div class="chart-wrap"><canvas id="chart-tokens"></canvas></div><div class="chart-wrap"><canvas id="chart-pass"></canvas></div></div>`;
      html+=`<div class="bk-section"><div class="bk-title">Comparaison</div><table class="bk-table"><thead><tr><th>Métrique</th>${cfgs.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('')}</tr></thead><tbody>`;
      [{label:'Tokens',key:'tokens',fmt:v=>Math.round(v).toLocaleString('fr-FR')},{label:'Pass rate',key:'pass_rate',fmt:v=>`${Math.round(v*100)}%`},{label:'Temps (s)',key:'time_seconds',fmt:v=>v.toFixed(1)}].forEach(row=>{html+=`<tr><td class="bk-label">${row.label}</td>${cfgs.map(c=>{const s=sum[c]?.[row.key]||{};return`<td>${row.fmt(s.mean||0)} <span class="bk-std">±${row.fmt(s.stddev||0)}</span></td>`;}).join('')}</tr>`;});
      const delta=sum.delta||{},fd=Object.values(delta)[0];
      if(fd){html+=`<tr><td class="bk-label">Δ tokens</td><td colspan="${cfgs.length}"><span class="${fd.tokens?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(fd.tokens||'—')}</span> ${fd.rating?`<span class="rating-badge rating-${esc(fd.rating)}">${esc(fd.rating)}</span>`:''}</td></tr>`;}
      html+='</tbody></table></div>';
      if(Object.keys(eff).length){html+=`<div class="bk-section"><div class="bk-title">Token Efficiency</div><table class="bk-table"><thead><tr><th>Config</th><th>Réf.</th><th>Δ Tokens</th><th>Δ Pass Rate</th><th>Tok/pt</th><th>Rating</th></tr></thead><tbody>`;Object.entries(eff).forEach(([c,e])=>{html+=`<tr><td>${esc(c)}</td><td class="bk-label">${esc(e.vs)}</td><td class="${e.tokens_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(e.tokens_delta)}</td><td class="${e.pass_rate_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(e.pass_rate_delta)}</td><td>${e.tokens_per_pass_rate_point?.toLocaleString('fr-FR')||'—'}</td><td><span class="rating-badge rating-${esc(e.rating)}">${esc(e.rating)}</span></td></tr>`;});html+='</tbody></table></div>';}
      if(notes.length){html+=`<div class="bk-section"><div class="bk-title">Observations</div><ul class="notes-list">${notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;}
      if(el)el.innerHTML=html;
      if(!chartsInit&&typeof Chart!=='undefined'){chartsInit=true;const labels=cfgs.map(c=>c.replace(/_/g,' '));const colors=['rgba(96,165,250,0.7)','rgba(248,113,113,0.7)','rgba(74,222,128,0.7)'];const borders=['#60A5FA','#F87171','#4ADE80'];const opts=(t)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:t,color:'#A1A1AA',font:{size:11,family:'Geist Mono, monospace',weight:'400'}}},scales:{x:{ticks:{color:'#52525B',font:{family:'Geist Mono, monospace',size:10}},grid:{color:'#27272A'}},y:{ticks:{color:'#52525B',font:{family:'Geist Mono, monospace',size:10}},grid:{color:'#27272A'}}}});new Chart(document.getElementById('chart-tokens'),{type:'bar',data:{labels,datasets:[{data:cfgs.map(c=>Math.round(sum[c]?.tokens?.mean||0)),backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:4}]},options:opts('tokens moyens')});new Chart(document.getElementById('chart-pass'),{type:'bar',data:{labels,datasets:[{data:cfgs.map(c=>Math.round((sum[c]?.pass_rate?.mean||0)*100)),backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:4}]},options:opts('pass rate %')});}
    }

    document.addEventListener('keydown',e=>{if(modalIsOpen){if(e.key==='Escape')closeModal();return;}if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;if(e.key==='ArrowLeft'||e.key==='k')navigate(-1);if(e.key==='ArrowRight'||e.key==='j')navigate(1);if(e.key==='b'){const bk=document.getElementById('tab-benchmark');switchTab(bk?.classList.contains('hidden')?'benchmark':'outputs');}if(e.key==='Escape')switchTab('outputs');});

    buildSidebar();renderCurrentEval();updateNavBar();
  </script>
</body>
</html>
