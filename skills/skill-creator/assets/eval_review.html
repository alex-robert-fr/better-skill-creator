<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>__SKILL_NAME_PLACEHOLDER__ — Review</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 12px 20px;
            display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .header h1 { font-size: 15px; font-weight: 600; color: #a5b4fc; }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
         color: #94a3b8; border: 1px solid transparent; transition: all .15s; }
  .tab.active { background: #2d3148; color: #e2e8f0; border-color: #4a5080; }
  .tab:hover:not(.active) { color: #c7d2fe; }

  /* Outputs tab */
  .outputs-panel { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 220px; flex-shrink: 0; background: #13151f; border-right: 1px solid #2d3148;
             overflow-y: auto; padding: 8px; }
  .eval-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
               color: #94a3b8; margin-bottom: 2px; transition: all .15s; white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; }
  .eval-item:hover { background: #1e2235; color: #c7d2fe; }
  .eval-item.active { background: #2d3148; color: #e2e8f0; }
  .eval-item .config-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px;
                              margin-left: 4px; }
  .badge-with { background: #1d3a5f; color: #60a5fa; }
  .badge-without { background: #3b1f1f; color: #f87171; }
  .badge-other { background: #2a2a1f; color: #fbbf24; }

  .main-content { flex: 1; overflow-y: auto; padding: 20px; }
  .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 8px;
          padding: 16px; margin-bottom: 16px; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase;
                letter-spacing: .05em; color: #64748b; margin-bottom: 10px; }

  .prompt-text { font-size: 14px; line-height: 1.6; color: #cbd5e1; }
  .transcript { font-size: 13px; line-height: 1.7; color: #94a3b8; white-space: pre-wrap;
                max-height: 400px; overflow-y: auto; }

  .assertions { display: flex; flex-direction: column; gap: 6px; }
  .assertion { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; }
  .assertion .icon { flex-shrink: 0; margin-top: 1px; }
  .assertion .evidence { font-size: 11px; color: #64748b; margin-top: 3px; }
  .pass { color: #4ade80; }
  .fail { color: #f87171; }

  .feedback-area { width: 100%; background: #0f1117; border: 1px solid #2d3148;
                   border-radius: 6px; padding: 10px; color: #e2e8f0; font-size: 13px;
                   resize: vertical; min-height: 80px; outline: none; transition: border-color .15s; }
  .feedback-area:focus { border-color: #4a5080; }

  .nav-bar { display: flex; align-items: center; gap: 12px; padding: 12px 20px;
             background: #13151f; border-top: 1px solid #2d3148; flex-shrink: 0; }
  .nav-btn { padding: 7px 16px; border-radius: 6px; border: 1px solid #2d3148;
             background: #1a1d27; color: #94a3b8; cursor: pointer; font-size: 13px;
             transition: all .15s; }
  .nav-btn:hover:not(:disabled) { background: #2d3148; color: #e2e8f0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-counter { font-size: 13px; color: #64748b; }
  .submit-btn { margin-left: auto; padding: 7px 18px; border-radius: 6px; border: none;
                background: #4f46e5; color: white; cursor: pointer; font-size: 13px;
                font-weight: 500; transition: background .15s; }
  .submit-btn:hover { background: #4338ca; }

  /* Benchmark tab */
  .benchmark-panel { flex: 1; overflow-y: auto; padding: 24px; }
  .bk-section { margin-bottom: 28px; }
  .bk-title { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 12px;
              text-transform: uppercase; letter-spacing: .06em; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; background: #13151f; color: #64748b;
       font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  td { padding: 9px 12px; border-bottom: 1px solid #1e2235; color: #cbd5e1; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1a1d27; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .kpi-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 8px; padding: 14px; }
  .kpi-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
  .kpi-value { font-size: 22px; font-weight: 700; margin: 4px 0; }
  .kpi-sub { font-size: 11px; color: #64748b; }
  .kpi-tokens { color: #a78bfa; }
  .kpi-pass { color: #4ade80; }
  .kpi-time { color: #60a5fa; }
  .kpi-eff { color: #fbbf24; }

  .delta-pos { color: #4ade80; }
  .delta-neg { color: #f87171; }
  .rating-excellent { color: #4ade80; }
  .rating-efficace { color: #a3e635; }
  .rating-acceptable { color: #fbbf24; }
  .rating-couteux { color: #f87171; }

  .note-item { font-size: 13px; color: #94a3b8; padding: 6px 0;
               border-bottom: 1px solid #1e2235; line-height: 1.5; }
  .note-item:last-child { border-bottom: none; }

  .hidden { display: none !important; }
  .collapse-toggle { cursor: pointer; color: #4a5080; font-size: 12px; margin-left: 8px; }
  .collapsible { display: none; margin-top: 8px; }
  .collapsible.open { display: block; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>__SKILL_NAME_PLACEHOLDER__</h1>
    <div id="save-status" style="font-size:12px;color:#4ade80;"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('outputs')">Outputs</div>
      <div class="tab" onclick="switchTab('benchmark')">Benchmark</div>
    </div>
  </div>

  <!-- ── OUTPUTS TAB ── -->
  <div id="tab-outputs" class="outputs-panel">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content" id="main-content"></div>
  </div>

  <!-- ── BENCHMARK TAB ── -->
  <div id="tab-benchmark" class="benchmark-panel hidden">
    <div id="benchmark-content"></div>
  </div>

  <!-- ── NAV BAR ── -->
  <div class="nav-bar" id="nav-bar">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Précédent</button>
    <span class="nav-counter" id="nav-counter"></span>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">Suivant →</button>
    <button class="submit-btn" onclick="submitReviews()">Soumettre les reviews</button>
  </div>

</div>

<script>
const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;
const BENCHMARK_DATA = __BENCHMARK_DATA_PLACEHOLDER__;
const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
const PREVIOUS_DATA = __PREVIOUS_DATA_PLACEHOLDER__;

// ── State ──
let currentIndex = 0;
const feedback = {};
EVAL_DATA.forEach(r => { feedback[r.run_id] = ""; });

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['outputs','benchmark'][i] === name);
  });
  document.getElementById('tab-outputs').classList.toggle('hidden', name !== 'outputs');
  document.getElementById('tab-benchmark').classList.toggle('hidden', name !== 'benchmark');
  document.getElementById('nav-bar').classList.toggle('hidden', name !== 'outputs');
  if (name === 'benchmark') renderBenchmark();
}

// ── Sidebar ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = EVAL_DATA.map((run, i) => {
    const cfg = run.configuration;
    const badgeClass = cfg === 'with_skill' ? 'badge-with'
                     : cfg === 'without_skill' ? 'badge-without' : 'badge-other';
    const label = cfg.replace(/_/g,' ');
    return `<div class="eval-item${i===0?' active':''}" id="item-${i}" onclick="goTo(${i})">
      ${run.eval_name}
      <span class="config-badge ${badgeClass}">${label}</span>
    </div>`;
  }).join('');
}

// ── Main view ──
function renderRun(index) {
  const run = EVAL_DATA[index];
  if (!run) return;

  const prev = PREVIOUS_DATA.find(r =>
    r.eval_name === run.eval_name && r.configuration === run.configuration
  );

  const expectations = run.grading?.expectations || [];
  const passCount = expectations.filter(e => e.passed).length;
  const passRate = expectations.length ? Math.round(passCount/expectations.length*100) : null;
  const tokens = run.timing?.total_tokens || 0;

  let html = `
    <div class="card">
      <div class="card-title">Prompt</div>
      <div class="prompt-text">${esc(run.prompt)}</div>
    </div>`;

  if (tokens > 0) {
    html += `<div class="card">
      <div class="card-title">Métriques</div>
      <div style="font-size:13px;color:#94a3b8;">
        Tokens : <strong style="color:#a78bfa">${tokens.toLocaleString()}</strong>
        ${run.timing?.total_duration_seconds ? ` &nbsp;·&nbsp; Durée : <strong style="color:#60a5fa">${run.timing.total_duration_seconds}s</strong>` : ''}
      </div>
    </div>`;
  }

  if (run.outputs_list?.length) {
    html += `<div class="card">
      <div class="card-title">Fichiers produits</div>
      <div style="font-size:13px;color:#64748b;">${run.outputs_list.map(f=>`📄 ${esc(f)}`).join(' &nbsp; ')}</div>
    </div>`;
  }

  html += `<div class="card">
    <div class="card-title">Transcript
      <span class="collapse-toggle" onclick="toggleCollapse('transcript-${index}')">▼</span>
    </div>
    <div class="collapsible open" id="transcript-${index}">
      <div class="transcript">${esc(run.transcript || '(vide)')}</div>
    </div>
  </div>`;

  if (expectations.length) {
    html += `<div class="card">
      <div class="card-title">Assertions ${passRate !== null ? `(${passRate}%)` : ''}</div>
      <div class="assertions">
        ${expectations.map(e => `
          <div class="assertion">
            <span class="icon ${e.passed ? 'pass' : 'fail'}">${e.passed ? '✓' : '✗'}</span>
            <div>
              <div>${esc(e.text)}</div>
              ${e.evidence ? `<div class="evidence">${esc(e.evidence)}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (prev) {
    html += `<div class="card">
      <div class="card-title">Itération précédente
        <span class="collapse-toggle" onclick="toggleCollapse('prev-${index}')">▼</span>
      </div>
      <div class="collapsible" id="prev-${index}">
        <div class="transcript">${esc(prev.transcript || '(vide)')}</div>
      </div>
    </div>`;
  }

  html += `<div class="card">
    <div class="card-title">Feedback</div>
    <textarea class="feedback-area" id="fb-${index}" placeholder="Notes sur ce run…"
      oninput="saveFeedback(${index})">${esc(feedback[run.run_id] || '')}</textarea>
  </div>`;

  document.getElementById('main-content').innerHTML = html;
  document.getElementById('nav-counter').textContent = `${index + 1} / ${EVAL_DATA.length}`;
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === EVAL_DATA.length - 1;
}

function saveFeedback(index) {
  const run = EVAL_DATA[index];
  feedback[run.run_id] = document.getElementById(`fb-${index}`)?.value || '';
  showStatus('Sauvegardé');
}

function showStatus(msg) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 1500);
}

function goTo(index) {
  // Sauvegarder le feedback en cours avant de naviguer
  const fb = document.getElementById(`fb-${currentIndex}`);
  if (fb) feedback[EVAL_DATA[currentIndex].run_id] = fb.value;

  document.getElementById(`item-${currentIndex}`)?.classList.remove('active');
  currentIndex = index;
  document.getElementById(`item-${currentIndex}`)?.classList.add('active');
  renderRun(currentIndex);
}

function navigate(dir) { goTo(currentIndex + dir); }

function toggleCollapse(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

// ── Benchmark ──
function renderBenchmark() {
  const bk = BENCHMARK_DATA;
  if (!bk || !bk.run_summary) {
    document.getElementById('benchmark-content').innerHTML =
      '<p style="color:#64748b;padding:20px">Benchmark non disponible.</p>';
    return;
  }

  const summary = bk.run_summary;
  const configs = Object.keys(summary).filter(k => k !== 'delta');
  const efficiency = bk.token_efficiency || {};
  const notes = bk.analyst_notes || [];
  const meta = bk.metadata || {};

  let html = `<div class="bk-section">
    <div class="bk-title">Vue d'ensemble — ${esc(meta.skill_name || SKILL_NAME)}</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:16px;">
      Modèle : ${esc(meta.executor_model || '—')} &nbsp;·&nbsp;
      Date : ${esc(meta.timestamp || '—')} &nbsp;·&nbsp;
      ${(meta.evals_run||[]).length} eval(s), ${meta.runs_per_configuration||1} run(s)/config
    </div>`;

  // KPI cards (tokens en premier)
  html += '<div class="kpi-grid">';
  configs.forEach(cfg => {
    const s = summary[cfg];
    const pr = s.pass_rate?.mean || 0;
    const tokens = Math.round(s.tokens?.mean || 0);
    const time = s.time_seconds?.mean?.toFixed(1) || '—';
    const eff = efficiency[cfg];
    const label = cfg.replace(/_/g, ' ');
    html += `<div class="kpi-card">
      <div class="kpi-label">${esc(label)}</div>
      <div class="kpi-value kpi-tokens">${tokens.toLocaleString()} tok</div>
      <div class="kpi-sub">
        Pass : <span class="kpi-pass">${Math.round(pr*100)}%</span>
        &nbsp;·&nbsp; Temps : <span class="kpi-time">${time}s</span>
      </div>
      ${eff ? `<div class="kpi-sub" style="margin-top:4px">
        Efficacité : <span class="rating-${eff.rating.replace('é','e').replace('û','u')}">${esc(eff.rating)}</span>
      </div>` : ''}
    </div>`;
  });
  html += '</div></div>';

  // Tableau comparatif
  html += `<div class="bk-section"><div class="bk-title">Comparaison</div>
    <table><thead><tr>
      <th>Métrique</th>${configs.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('')}
    </tr></thead><tbody>`;

  const rows = [
    { label: 'Tokens', key: 'tokens', fmt: v => Math.round(v).toLocaleString() },
    { label: 'Pass Rate', key: 'pass_rate', fmt: v => `${Math.round(v*100)}%` },
    { label: 'Temps (s)', key: 'time_seconds', fmt: v => v.toFixed(1) },
  ];
  rows.forEach(row => {
    html += `<tr><td style="color:#64748b;font-size:12px">${row.label}</td>`;
    configs.forEach(cfg => {
      const stat = summary[cfg]?.[row.key] || {};
      const mean = stat.mean || 0;
      const std = stat.stddev || 0;
      html += `<td>${row.fmt(mean)} <span style="color:#4a5080;font-size:11px">±${row.fmt(std)}</span></td>`;
    });
    html += '</tr>';
  });

  // Ligne delta si disponible
  const delta = summary.delta || {};
  if (Object.keys(delta).length) {
    const firstNonRef = Object.keys(delta)[0];
    const d = delta[firstNonRef];
    if (d) {
      html += `<tr><td style="color:#64748b;font-size:12px">Δ tokens</td>
        <td colspan="${configs.length}" class="${d.tokens?.startsWith('-')?'delta-pos':'delta-neg'}">${esc(d.tokens||'—')}</td></tr>`;
    }
  }

  html += '</tbody></table></div>';

  // Token efficiency
  if (Object.keys(efficiency).length) {
    html += `<div class="bk-section"><div class="bk-title">Token Efficiency</div><table>
      <thead><tr><th>Config</th><th>Référence</th><th>Δ Tokens</th><th>Δ Pass Rate</th><th>Tok/point</th><th>Rating</th></tr></thead><tbody>`;
    Object.entries(efficiency).forEach(([cfg, eff]) => {
      const ratingKey = eff.rating.replace('é','e').replace('û','u');
      html += `<tr>
        <td>${esc(cfg)}</td>
        <td style="color:#64748b">${esc(eff.vs)}</td>
        <td class="${eff.tokens_delta?.startsWith('-')?'delta-pos':'delta-neg'}">${esc(eff.tokens_delta)}</td>
        <td class="${eff.pass_rate_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.pass_rate_delta)}</td>
        <td>${eff.tokens_per_pass_rate_point?.toLocaleString() || '—'}</td>
        <td class="rating-${ratingKey}">${esc(eff.rating)}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Observations analytiques
  if (notes.length) {
    html += `<div class="bk-section"><div class="bk-title">Observations</div>`;
    notes.forEach(n => { html += `<div class="note-item">· ${esc(n)}</div>`; });
    html += '</div>';
  }

  document.getElementById('benchmark-content').innerHTML = html;
}

// ── Submit ──
function submitReviews() {
  // Sauvegarder le feedback en cours
  const fb = document.getElementById(`fb-${currentIndex}`);
  if (fb) feedback[EVAL_DATA[currentIndex].run_id] = fb.value;

  const reviews = EVAL_DATA.map(run => ({
    run_id: run.run_id,
    feedback: feedback[run.run_id] || '',
    timestamp: new Date().toISOString(),
  }));

  const data = JSON.stringify({ reviews, status: 'complete' }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'feedback.json';
  a.click();
  URL.revokeObjectURL(url);
  showStatus('feedback.json téléchargé ✓');
}

// ── Utils ──
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// ── Init ──
buildSidebar();
renderRun(0);
</script>
</body>
</html>
