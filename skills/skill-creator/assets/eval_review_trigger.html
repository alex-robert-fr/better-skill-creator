<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>__SKILL_NAME_PLACEHOLDER__ — Description Optimization</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  .app { display: flex; flex-direction: column; height: 100vh; }
  .header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 12px 20px;
            display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .header h1 { font-size: 15px; font-weight: 600; color: #a5b4fc; }
  .header .subtitle { font-size: 12px; color: #64748b; }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
         color: #94a3b8; border: 1px solid transparent; transition: all .15s; }
  .tab.active { background: #2d3148; color: #e2e8f0; border-color: #4a5080; }
  .tab:hover:not(.active) { color: #c7d2fe; }

  .panel { flex: 1; overflow-y: auto; padding: 24px; }

  /* Eval Set Editor */
  .editor-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .toolbar-btn { padding: 7px 14px; border-radius: 6px; border: 1px solid #2d3148;
                 background: #1a1d27; color: #94a3b8; cursor: pointer; font-size: 13px;
                 transition: all .15s; }
  .toolbar-btn:hover { background: #2d3148; color: #e2e8f0; }
  .export-btn { background: #4f46e5; border-color: #4f46e5; color: white; margin-left: auto; }
  .export-btn:hover { background: #4338ca; border-color: #4338ca; }

  .stats-bar { font-size: 12px; color: #64748b; }
  .stats-bar span { margin-right: 16px; }
  .count-trigger { color: #4ade80; }
  .count-no { color: #f87171; }

  .queries-list { display: flex; flex-direction: column; gap: 8px; }
  .query-row { display: flex; align-items: flex-start; gap: 10px; background: #1a1d27;
               border: 1px solid #2d3148; border-radius: 8px; padding: 10px 12px;
               transition: border-color .15s; }
  .query-row:hover { border-color: #4a5080; }
  .query-row.should-trigger { border-left: 3px solid #4ade80; }
  .query-row.should-not { border-left: 3px solid #f87171; }

  .toggle-btn { flex-shrink: 0; padding: 4px 10px; border-radius: 5px; border: none;
                cursor: pointer; font-size: 11px; font-weight: 600; transition: all .15s;
                min-width: 60px; text-align: center; }
  .toggle-btn.yes { background: #14532d; color: #4ade80; }
  .toggle-btn.no  { background: #450a0a; color: #f87171; }
  .toggle-btn:hover { opacity: .8; }

  .query-input { flex: 1; background: transparent; border: none; color: #e2e8f0;
                 font-size: 13px; line-height: 1.5; outline: none; resize: none;
                 min-height: 20px; font-family: inherit; }
  .query-input::placeholder { color: #4a5080; }

  .del-btn { flex-shrink: 0; background: none; border: none; color: #4a5080;
             cursor: pointer; font-size: 16px; padding: 2px 4px; line-height: 1;
             transition: color .15s; }
  .del-btn:hover { color: #f87171; }

  .add-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-input { flex: 1; background: #13151f; border: 1px dashed #2d3148; border-radius: 8px;
               padding: 10px 12px; color: #94a3b8; font-size: 13px; outline: none;
               transition: border-color .15s; font-family: inherit; }
  .add-input:focus { border-color: #4a5080; color: #e2e8f0; }
  .add-trigger-btn { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer;
                     font-size: 12px; font-weight: 600; }
  .add-t  { background: #14532d; color: #4ade80; }
  .add-n  { background: #450a0a; color: #f87171; }

  /* Results tab */
  .desc-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .desc-box { background: #1a1d27; border: 1px solid #2d3148; border-radius: 8px; padding: 14px; }
  .desc-box .label { font-size: 11px; color: #64748b; text-transform: uppercase;
                     letter-spacing: .05em; margin-bottom: 8px; }
  .desc-box .text { font-size: 13px; line-height: 1.6; color: #cbd5e1; }
  .desc-box.best { border-color: #4ade80; }
  .desc-box.best .label { color: #4ade80; }

  .iter-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 24px; }
  .iter-table th { text-align: left; padding: 8px 12px; background: #13151f; color: #64748b;
                   font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .iter-table td { padding: 9px 12px; border-bottom: 1px solid #1e2235; color: #cbd5e1; }
  .iter-table tr.best-row td { background: #14250f; }
  .iter-table tr:hover td { background: #1a1d27; }

  .score-bar { display: inline-flex; align-items: center; gap: 6px; }
  .bar-bg { width: 80px; height: 6px; background: #1e2235; border-radius: 3px; }
  .bar-fill { height: 100%; border-radius: 3px; background: #4ade80; }

  .failures-section { margin-top: 16px; }
  .failures-title { font-size: 12px; color: #64748b; text-transform: uppercase;
                    margin-bottom: 8px; }
  .failure-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px;
                 margin: 3px; }
  .fn { background: #3b1f1f; color: #f87171; }
  .fp { background: #1f2e3b; color: #60a5fa; }

  .section-title { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 12px;
                   text-transform: uppercase; letter-spacing: .06em; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>__SKILL_NAME_PLACEHOLDER__</h1>
    <div class="subtitle">Description Optimization</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('editor')">Eval Set</div>
      <div class="tab" id="tab-results-btn" onclick="switchTab('results')">Résultats</div>
    </div>
  </div>

  <!-- ── EVAL SET EDITOR ── -->
  <div id="tab-editor" class="panel">
    <div class="editor-toolbar">
      <div class="stats-bar">
        <span>Total : <strong id="count-total">0</strong></span>
        <span class="count-trigger">✓ Trigger : <strong id="count-trigger">0</strong></span>
        <span class="count-no">✗ No-trigger : <strong id="count-no">0</strong></span>
      </div>
      <button class="toolbar-btn export-btn" onclick="exportEvalSet()">Export Eval Set</button>
    </div>

    <div class="desc-box" style="margin-bottom:16px">
      <div class="label">Description actuelle</div>
      <div class="text" id="current-desc">__SKILL_DESCRIPTION_PLACEHOLDER__</div>
    </div>

    <div class="queries-list" id="queries-list"></div>

    <div class="add-row">
      <textarea class="add-input" id="new-query" rows="1"
        placeholder="Nouvelle query… (Enter pour valider)"
        onkeydown="handleAddKey(event)"></textarea>
      <button class="add-trigger-btn add-t" onclick="addQuery(true)">+ Trigger</button>
      <button class="add-trigger-btn add-n" onclick="addQuery(false)">+ No-trigger</button>
    </div>
  </div>

  <!-- ── RESULTS ── -->
  <div id="tab-results" class="panel hidden">
    <div id="results-content">
      <p style="color:#64748b">Aucun résultat disponible. Lancer run_loop.py d'abord.</p>
    </div>
  </div>

</div>

<script>
const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
const INITIAL_EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;
const LOOP_RESULTS = __LOOP_RESULTS_PLACEHOLDER__;

let queries = INITIAL_EVAL_DATA.map((e, i) => ({ ...e, id: i }));
let nextId = queries.length;

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['editor','results'][i] === name);
  });
  document.getElementById('tab-editor').classList.toggle('hidden', name !== 'editor');
  document.getElementById('tab-results').classList.toggle('hidden', name !== 'results');
  if (name === 'results') renderResults();
}

// ── Editor ──
function renderEditor() {
  const list = document.getElementById('queries-list');
  list.innerHTML = queries.map(q => `
    <div class="query-row ${q.should_trigger ? 'should-trigger' : 'should-not'}" id="row-${q.id}">
      <button class="toggle-btn ${q.should_trigger ? 'yes' : 'no'}"
        onclick="toggleTrigger(${q.id})">${q.should_trigger ? '✓ OUI' : '✗ NON'}</button>
      <textarea class="query-input" rows="1"
        oninput="updateQuery(${q.id}, this.value); autoResize(this)"
        onblur="autoResize(this)">${esc(q.query)}</textarea>
      <button class="del-btn" onclick="deleteQuery(${q.id})" title="Supprimer">×</button>
    </div>`).join('');

  // Auto-resize toutes les textareas
  list.querySelectorAll('.query-input').forEach(autoResize);
  updateStats();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function updateStats() {
  document.getElementById('count-total').textContent = queries.length;
  document.getElementById('count-trigger').textContent = queries.filter(q => q.should_trigger).length;
  document.getElementById('count-no').textContent = queries.filter(q => !q.should_trigger).length;
}

function toggleTrigger(id) {
  const q = queries.find(q => q.id === id);
  if (!q) return;
  q.should_trigger = !q.should_trigger;
  const row = document.getElementById(`row-${id}`);
  row.className = `query-row ${q.should_trigger ? 'should-trigger' : 'should-not'}`;
  row.querySelector('.toggle-btn').className = `toggle-btn ${q.should_trigger ? 'yes' : 'no'}`;
  row.querySelector('.toggle-btn').textContent = q.should_trigger ? '✓ OUI' : '✗ NON';
  updateStats();
}

function updateQuery(id, value) {
  const q = queries.find(q => q.id === id);
  if (q) q.query = value;
}

function deleteQuery(id) {
  queries = queries.filter(q => q.id !== id);
  document.getElementById(`row-${id}`)?.remove();
  updateStats();
}

function addQuery(shouldTrigger) {
  const input = document.getElementById('new-query');
  const text = input.value.trim();
  if (!text) return;
  const q = { id: nextId++, query: text, should_trigger: shouldTrigger };
  queries.push(q);
  input.value = '';
  renderEditor();
  document.getElementById(`row-${q.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function handleAddKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addQuery(true);
  }
}

// ── Export ──
function exportEvalSet() {
  const data = queries.map(({ query, should_trigger }) => ({ query, should_trigger }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'eval_set.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Results ──
function renderResults() {
  if (!LOOP_RESULTS || !LOOP_RESULTS.history?.length) return;

  const { best_description, best_score, history, total_tokens } = LOOP_RESULTS;
  const initial = history[0];
  let html = '';

  // Description avant/après
  html += `<div class="desc-compare">
    <div class="desc-box">
      <div class="label">Description initiale (score test : ${pct(initial.test_score)})</div>
      <div class="text">${esc(initial.description)}</div>
    </div>
    <div class="desc-box best">
      <div class="label">★ Meilleure description (score test : ${pct(best_score)})</div>
      <div class="text">${esc(best_description)}</div>
    </div>
  </div>`;

  // Tableau des itérations
  html += `<div class="section-title">Progression</div>
  <table class="iter-table">
    <thead><tr>
      <th>Itération</th><th>Score Train</th><th>Score Test</th>
      <th>Tokens</th><th>FP</th><th>FN</th>
    </tr></thead><tbody>`;

  history.forEach(iter => {
    const isBest = iter.description === best_description;
    html += `<tr class="${isBest ? 'best-row' : ''}">
      <td>${isBest ? '★ ' : ''}${iter.iteration === 0 ? 'Initiale' : `Iter ${iter.iteration}`}</td>
      <td><div class="score-bar">
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(iter.train_score*100)}%"></div></div>
        ${pct(iter.train_score)}
      </div></td>
      <td><div class="score-bar">
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(iter.test_score*100)}%"></div></div>
        ${pct(iter.test_score)}
      </div></td>
      <td style="color:#a78bfa">${iter.tokens?.toLocaleString() || '—'}</td>
      <td style="color:#60a5fa">${iter.false_positives ?? '—'}</td>
      <td style="color:#f87171">${iter.false_negatives ?? '—'}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  html += `<div style="font-size:12px;color:#64748b;margin-bottom:24px">
    Tokens totaux consommés : <strong style="color:#a78bfa">${total_tokens?.toLocaleString() || '—'}</strong>
  </div>`;

  document.getElementById('results-content').innerHTML = html;
}

// ── Utils ──
function pct(v) { return `${Math.round((v||0)*100)}%`; }
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Init ──
renderEditor();
if (LOOP_RESULTS?.history?.length) {
  document.getElementById('tab-results-btn').style.color = '#a5b4fc';
}
</script>
</body>
</html>
