<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__SKILL_NAME_PLACEHOLDER__ — TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:     #0C0800;
      --s1:     #130E00;
      --s2:     #1C1500;
      --b1:     #2C1F00;
      --b2:     #3D2B00;
      --A:      #FFB000;
      --A2:     #CC8C00;
      --A3:     #805800;
      --A4:     #4D3500;
      --Ab:     #FFCC44;
      --pass:   #66FF88;
      --fail:   #FF5500;
      --glow:   0 0 10px rgba(255,176,0,0.35);
      --glow-s: 0 0 6px rgba(255,176,0,0.25);
      --glow-b: 0 0 14px rgba(255,176,0,0.55);
      --pglow:  0 0 8px rgba(102,255,136,0.4);
      --fglow:  0 0 8px rgba(255,85,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--b1); }

    body {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--A);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 13px;
      line-height: 1.5;
      cursor: default;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 9000;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 140% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none; z-index: 8999;
    }

    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .cursor { display: inline-block; animation: blink 1s step-end infinite; color: var(--A); }

    /* ── HEADER ─────────────────────────────────────────── */
    .app-header { flex-shrink: 0; border-bottom: 1px solid var(--b1); background: var(--s1); }
    .header-top {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px; border-bottom: 1px solid var(--b1);
    }
    .header-prompt { color: var(--A4); font-size: 12px; flex-shrink: 0; }
    .header-skill { color: var(--Ab); font-size: 13px; letter-spacing: 0.04em; text-shadow: var(--glow-b); }
    .header-spacer { flex: 1; }
    #save-status { font-size: 11px; color: var(--pass); text-shadow: var(--pglow); letter-spacing: 0.06em; }
    .header-tabs { display: flex; }
    .header-tabs button {
      background: none; border: none; border-right: 1px solid var(--b1);
      color: var(--A4); font-family: 'Share Tech Mono', monospace; font-size: 11px;
      padding: 6px 16px; cursor: pointer; letter-spacing: 0.04em;
      transition: color 80ms;
    }
    .header-tabs button:hover { color: var(--A3); }
    .header-tabs button.active { color: var(--A); text-shadow: var(--glow-s); }
    .header-tabs button.active::before { content: '> '; }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .app-body { display: flex; flex: 1; overflow: hidden; position: relative; }
    .tab-panel { display: flex; flex: 1; overflow: hidden; }
    .tab-panel.hidden { display: none !important; }
    .outputs-panel { display: flex; }

    #sidebar {
      width: 224px;
      flex-shrink: 0;
      border-right: 1px solid var(--b1);
      overflow-y: auto;
      background: var(--s1);
      display: flex;
      flex-direction: column;
    }
    .sidebar-label {
      font-size: 10px;
      color: var(--A4);
      letter-spacing: 0.08em;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--b1);
      flex-shrink: 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 80ms;
    }
    .sidebar-item:hover { background: rgba(255,176,0,0.04); }
    .sidebar-item.active { border-left-color: var(--A); background: rgba(255,176,0,0.06); }
    .sbi-badge { font-size: 10px; flex-shrink: 0; font-weight: bold; }
    .badge-ok   { color: var(--pass); text-shadow: var(--pglow); }
    .badge-fail { color: var(--fail); text-shadow: var(--fglow); }
    .badge-neutral { color: var(--A4); }
    .sbi-name {
      flex: 1; font-size: 11px; color: var(--A3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-item.active .sbi-name { color: var(--A); text-shadow: var(--glow-s); }
    .sbi-pr { font-size: 10px; color: var(--A4); flex-shrink: 0; }
    .sidebar-item.active .sbi-pr { color: var(--A2); }

    /* ── MAIN CONTENT ────────────────────────────────────── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 70px;
    }

    .eval-header { margin-bottom: 20px; }
    #eval-name {
      color: var(--Ab);
      text-shadow: var(--glow);
      font-size: 13px;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    #eval-prompt { font-size: 12px; color: var(--A3); line-height: 1.6; }
    #eval-prompt p { margin-bottom: 4px; }

    /* ── STATS STRIP ─────────────────────────────────────── */
    #stats-strip { margin-bottom: 20px; }
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      border: 1px solid var(--b1);
    }
    .stat-cell {
      flex: 1;
      min-width: 120px;
      padding: 8px 14px;
      border-right: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-lbl {
      font-size: 9px;
      color: var(--A4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .stat-val {
      font-size: 13px;
      color: var(--A2);
      text-shadow: var(--glow-s);
    }
    .stat-delta-cell.delta-pos .stat-val { color: var(--fail); text-shadow: var(--fglow); }
    .stat-delta-cell.delta-neg .stat-val { color: var(--pass); text-shadow: var(--pglow); }
    .delta-pos { color: var(--fail); text-shadow: var(--fglow); }
    .delta-neg { color: var(--pass); text-shadow: var(--pglow); }

    /* ── COMPARE TABLE ───────────────────────────────────── */
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      border: 1px solid var(--b1);
    }
    .compare-table th {
      text-align: left;
      padding: 8px 14px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--A3);
      border-bottom: 1px solid var(--b1);
    }
    .th-assertion { width: 50%; }
    .col-with { color: var(--A) !important; text-shadow: var(--glow-s); }
    .col-without { color: var(--A2) !important; }

    .td-text {
      padding: 9px 14px;
      border-bottom: 1px solid var(--b1);
      font-size: 12px;
      color: var(--A3);
      vertical-align: top;
      line-height: 1.5;
    }
    .td-result {
      padding: 9px 14px;
      border-bottom: 1px solid var(--b1);
      vertical-align: top;
      width: 18%;
    }
    .td-pass .res-icon {
      font-size: 11px;
      font-weight: bold;
      color: var(--pass);
      text-shadow: var(--pglow);
    }
    .td-fail .res-icon {
      font-size: 11px;
      font-weight: bold;
      color: var(--fail);
      text-shadow: var(--fglow);
    }
    .td-na .res-icon { font-size: 11px; color: var(--A4); }
    .res-ev { font-size: 10px; color: var(--A4); margin-top: 4px; line-height: 1.4; }

    .tr-metric td { padding: 7px 14px; border-bottom: 1px solid var(--b1); }
    .td-metric-lbl {
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--A4);
    }
    .td-metric { font-size: 12px; color: var(--A3); }
    .td-metric span { font-size: 11px; margin-left: 4px; }

    /* ── OUTPUTS ─────────────────────────────────────────── */
    .outputs-row {
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    }
    .out-lbl { font-size: 10px; color: var(--A4); letter-spacing: 0.06em; text-transform: uppercase; }
    .out-sep { font-size: 12px; color: var(--b2); padding: 0 4px; }
    .output-btn {
      background: none; border: 1px solid var(--b1); color: var(--A3);
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      padding: 3px 10px; cursor: pointer; transition: 80ms;
    }
    .output-btn:hover { color: var(--A); border-color: var(--A3); text-shadow: var(--glow-s); }

    /* ── SECTIONS ─────────────────────────────────────────── */
    .section-block { margin-bottom: 20px; }
    .section-hdr {
      font-size: 11px; letter-spacing: 0.06em; color: var(--A4);
      padding: 8px 0; border-top: 1px solid var(--b1);
      display: flex; align-items: center; justify-content: space-between;
    }
    .collapsible-toggle { cursor: pointer; transition: color 80ms; }
    .collapsible-toggle:hover { color: var(--A3); }
    .arrow { font-size: 10px; color: var(--A4); }
    .collapsible { max-height: 0; overflow: hidden; transition: max-height 250ms ease; }
    .collapsible.open { max-height: 4000px; }

    .transcript-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding-top: 12px; }
    .col-sub-label { font-size: 10px; color: var(--A4); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }

    .feedback-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding-top: 10px; }
    .feedback-area {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid var(--b1); color: var(--A);
      font-family: 'Share Tech Mono', monospace; font-size: 12px;
      line-height: 1.5; padding: 6px 0; resize: none; min-height: 56px; outline: none;
      transition: border-color 80ms;
    }
    .feedback-area::placeholder { color: var(--A4); }
    .feedback-area:focus { border-bottom-color: var(--A3); }

    /* ── MARKDOWN ────────────────────────────────────────── */
    .md-render { font-size: 12px; color: var(--A3); line-height: 1.7; }
    .md-render p { margin-bottom: 6px; }
    .md-render p:last-child { margin-bottom: 0; }
    .md-render pre { background: var(--s1); border: 1px solid var(--b1); padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
    .md-render code { color: var(--Ab); }
    .md-render h1, .md-render h2, .md-render h3 { color: var(--A2); margin: 10px 0 4px; }
    .md-render ul, .md-render ol { padding-left: 18px; margin: 6px 0; }
    .md-render li { margin: 2px 0; }
    .md-render blockquote { border-left: 2px solid var(--b2); padding-left: 12px; color: var(--A4); margin: 6px 0; }

    .empty-state { font-size: 12px; color: var(--A4); padding: 14px 0; }

    /* ── NAV BAR ─────────────────────────────────────────── */
    #nav-bar {
      position: absolute; bottom: 0; left: 224px; right: 0;
      height: 38px; display: flex; align-items: center; justify-content: center;
      gap: 12px; border-top: 1px solid var(--b1); background: var(--bg); z-index: 20;
    }
    #nav-bar.hidden { display: none !important; }
    .nav-btn {
      background: none; border: none; color: var(--A3);
      font-family: 'Share Tech Mono', monospace; font-size: 12px;
      cursor: pointer; padding: 3px 10px; transition: color 80ms;
    }
    .nav-btn:hover:not(:disabled) { color: var(--A); text-shadow: var(--glow-s); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    #nav-counter { font-size: 11px; color: var(--A4); min-width: 52px; text-align: center; }
    .nav-sep { color: var(--b2); font-size: 14px; }
    .nav-submit {
      background: none; border: 1px solid var(--A); color: var(--A);
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      padding: 3px 14px; cursor: pointer;
      text-shadow: var(--glow-s); transition: background 80ms;
    }
    .nav-submit:hover { background: rgba(255,176,0,0.08); }
    .nav-hints { font-size: 10px; color: var(--A4); letter-spacing: 0.04em; }

    /* ── BENCHMARK ───────────────────────────────────────── */
    #tab-benchmark { overflow-y: auto; padding: 32px 40px; display: block !important; }
    #benchmark-content { max-width: 820px; display: flex; flex-direction: column; gap: 32px; }
    .bk-meta { font-size: 11px; color: var(--A4); letter-spacing: 0.04em; }
    .kpi-grid { display: flex; gap: 12px; flex-wrap: wrap; }
    .kpi-card {
      flex: 1; min-width: 160px; border: 1px solid var(--b1);
      padding: 14px 18px; display: flex; flex-direction: column; gap: 6px;
    }
    .kpi-cfg { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--A4); }
    .kpi-tokens { font-size: 24px; color: var(--Ab); text-shadow: var(--glow); line-height: 1; letter-spacing: -0.02em; }
    .kpi-stats { display: flex; gap: 10px; font-size: 12px; }
    .kpi-pass { color: var(--pass); text-shadow: var(--pglow); }
    .kpi-time { color: var(--A4); }
    .kpi-rating { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .chart-wrap { border: 1px solid var(--b1); padding: 14px; height: 200px; position: relative; }
    .bk-section { display: flex; flex-direction: column; gap: 12px; }
    .bk-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--A4); }
    .bk-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .bk-table th { text-align: left; padding: 7px 12px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--A4); border-bottom: 1px solid var(--b1); }
    .bk-table td { padding: 9px 12px; border-bottom: 1px solid var(--b1); vertical-align: middle; }
    .bk-table tr:last-child td { border-bottom: none; }
    .bk-label { color: var(--A3) !important; font-size: 11px; }
    .bk-std { color: var(--A4); font-size: 10px; }
    .rating-badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border: 1px solid; }
    .rating-excellent, .rating-efficace { color: var(--pass); border-color: rgba(102,255,136,0.3); text-shadow: var(--pglow); }
    .rating-neutre, .rating-moderate { color: #F5C842; border-color: rgba(245,200,66,0.3); }
    .rating-couteux, .rating-poor { color: var(--fail); border-color: rgba(255,85,0,0.3); text-shadow: var(--fglow); }
    .notes-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .notes-list li { font-size: 12px; color: var(--A3); line-height: 1.6; padding-left: 14px; position: relative; }
    .notes-list li::before { content: '>'; position: absolute; left: 0; color: var(--A4); }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 40px;
    }
    .modal.hidden { display: none !important; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-inner {
      background: var(--s1); border: 1px solid var(--A);
      box-shadow: 0 0 40px rgba(255,176,0,0.12);
      width: 100%; max-width: 860px; max-height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
      animation: modalIn 180ms ease both;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; border-bottom: 1px solid var(--b1); flex-shrink: 0;
    }
    #modal-title { color: var(--Ab); font-size: 12px; letter-spacing: 0.04em; text-shadow: var(--glow-s); }
    .modal-close {
      background: none; border: none; color: var(--A3); font-size: 13px;
      cursor: pointer; padding: 2px 6px; transition: color 80ms;
    }
    .modal-close:hover { color: var(--fail); text-shadow: var(--fglow); }
    #modal-body { overflow-y: auto; flex: 1; padding: 18px; }
    .code-block { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--A2); line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-top">
      <span class="header-prompt">root@eval:~$</span>
      <span class="header-skill">__SKILL_NAME_PLACEHOLDER__</span><span class="cursor">▌</span>
      <div class="header-spacer"></div>
      <span id="save-status"></span>
    </div>
    <div class="header-tabs">
      <button data-tab="outputs" onclick="switchTab('outputs')" class="active">OUTPUTS</button>
      <button data-tab="benchmark" onclick="switchTab('benchmark')">BENCHMARK</button>
    </div>
  </header>

  <div class="app-body">

    <div id="tab-outputs" class="tab-panel outputs-panel">

      <aside id="sidebar">
        <div class="sidebar-label">// EVAL LIST</div>
      </aside>

      <div id="main-content">

        <div class="eval-header">
          <div id="eval-name"></div>
          <div id="eval-prompt"></div>
        </div>

        <div id="stats-strip"></div>
        <div id="compare-table-wrap"></div>
        <div id="outputs-section"></div>

        <div class="section-block">
          <div class="section-hdr collapsible-toggle" onclick="toggleSection('tr-section')">
            [+] TRANSCRIPTS <span class="arrow">▾</span>
          </div>
          <div class="collapsible" id="tr-section">
            <div class="transcript-cols">
              <div>
                <div class="col-sub-label">// WITH SKILL</div>
                <div class="md-render" id="transcript-with"></div>
              </div>
              <div>
                <div class="col-sub-label">// WITHOUT SKILL</div>
                <div class="md-render" id="transcript-without"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="section-block">
          <div class="section-hdr">// FEEDBACK</div>
          <div class="feedback-row">
            <div>
              <div class="col-sub-label">WITH SKILL:</div>
              <textarea class="feedback-area" id="fb-with" placeholder="> notes..."
                oninput="saveFeedback(this.getAttribute('data-run'),this.value)" data-run=""></textarea>
            </div>
            <div>
              <div class="col-sub-label">WITHOUT SKILL:</div>
              <textarea class="feedback-area" id="fb-without" placeholder="> notes..."
                oninput="saveFeedback(this.getAttribute('data-run'),this.value)" data-run=""></textarea>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="tab-benchmark" class="tab-panel hidden">
      <div id="benchmark-content"></div>
    </div>

    <nav id="nav-bar">
      <button id="btn-prev" class="nav-btn" onclick="navigate(-1)">◄ PREV</button>
      <span id="nav-counter"></span>
      <button id="btn-next" class="nav-btn" onclick="navigate(1)">NEXT ►</button>
      <span class="nav-sep">|</span>
      <button class="nav-submit" onclick="submitReviews()">[ SUBMIT ]</button>
      <span class="nav-sep">|</span>
      <span class="nav-hints">j/k · ← → · b · ESC</span>
    </nav>

  </div>

  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()">[X]</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;
    const BENCHMARK_DATA = __BENCHMARK_DATA_PLACEHOLDER__;
    const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
    const PREVIOUS_DATA = __PREVIOUS_DATA_PLACEHOLDER__;

    function esc(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function renderMd(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined') return marked.parse(text);
      return '<pre style="white-space:pre-wrap">' + esc(text) + '</pre>';
    }

    const runOutputsMap = {};
    EVAL_DATA.forEach(r => { runOutputsMap[r.run_id] = r.outputs_content || {}; });

    let modalIsOpen = false;
    function openModal(filename, runId) {
      const content = runOutputsMap[runId]?.[filename] || '(contenu non disponible)';
      document.getElementById('modal-title').textContent = filename;
      const body = document.getElementById('modal-body');
      if (filename.endsWith('.md')) {
        body.innerHTML = '<div class="md-render">' + renderMd(content) + '</div>';
      } else if (filename.endsWith('.json')) {
        try { body.innerHTML = '<pre class="code-block">' + esc(JSON.stringify(JSON.parse(content),null,2)) + '</pre>'; }
        catch { body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>'; }
      } else {
        body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>';
      }
      document.getElementById('modal').classList.remove('hidden');
      modalIsOpen = true;
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); modalIsOpen = false; }
    function handleModalClick(e) { if (e.target.id === 'modal') closeModal(); }

    function buildEvalGroups(data) {
      const map = new Map();
      data.forEach(run => {
        if (!map.has(run.eval_name)) map.set(run.eval_name, { name: run.eval_name, prompt: run.prompt, configs: {} });
        map.get(run.eval_name).configs[run.configuration] = run;
      });
      return Array.from(map.values());
    }
    const evalGroups = buildEvalGroups(EVAL_DATA);
    let currentEvalIndex = 0;
    const feedback = {};
    EVAL_DATA.forEach(r => { feedback[r.run_id] = ''; });

    function getPassRate(run) {
      const exp = run?.grading?.expectations || [];
      if (!exp.length) return null;
      return Math.round(exp.filter(e => e.passed).length / exp.length * 100);
    }

    function renderStatsStrip(withRun, withoutRun) {
      const el = document.getElementById('stats-strip');
      if (!el) return;
      const withTokens = withRun?.timing?.total_tokens || 0;
      const withoutTokens = withoutRun?.timing?.total_tokens || 0;
      const withTime = withRun?.timing?.total_duration_seconds;
      const withoutTime = withoutRun?.timing?.total_duration_seconds;
      const withPR = getPassRate(withRun);
      const withoutPR = getPassRate(withoutRun);
      let tokenDelta = '', tDeltaCls = '';
      if (withTokens && withoutTokens) {
        const d = ((withTokens - withoutTokens) / withoutTokens * 100).toFixed(0);
        tokenDelta = (d > 0 ? '+' : '') + d + '%';
        tDeltaCls = d > 0 ? 'delta-pos' : 'delta-neg';
      }
      el.innerHTML = `<div class="stats-grid">
        <div class="stat-cell"><span class="stat-lbl">WITH_TOKENS</span><span class="stat-val">${withTokens.toLocaleString('fr-FR')}</span></div>
        <div class="stat-cell"><span class="stat-lbl">W/O_TOKENS</span><span class="stat-val">${withoutTokens.toLocaleString('fr-FR')}</span></div>
        ${tokenDelta ? `<div class="stat-cell stat-delta-cell ${tDeltaCls}"><span class="stat-lbl">DELTA</span><span class="stat-val">${tokenDelta}</span></div>` : ''}
        ${withTime || withoutTime ? `<div class="stat-cell"><span class="stat-lbl">TIME</span><span class="stat-val">${withTime||'—'}s / ${withoutTime||'—'}s</span></div>` : ''}
        ${withPR !== null ? `<div class="stat-cell"><span class="stat-lbl">PASS_RATE</span><span class="stat-val">${withPR}% / ${withoutPR !== null ? withoutPR+'%' : '—'}</span></div>` : ''}
      </div>`;
    }

    function renderCompareTable(g, withRun, withoutRun) {
      const el = document.getElementById('compare-table-wrap');
      if (!el) return;
      const withExp = withRun?.grading?.expectations || [];
      const withoutExp = withoutRun?.grading?.expectations || [];
      const assertKeys = [];
      const assertMap = new Map();
      withExp.forEach(e => {
        if (!assertMap.has(e.text)) { assertKeys.push(e.text); assertMap.set(e.text, {with: null, without: null}); }
        assertMap.get(e.text).with = e;
      });
      withoutExp.forEach(e => {
        if (!assertMap.has(e.text)) { assertKeys.push(e.text); assertMap.set(e.text, {with: null, without: null}); }
        assertMap.get(e.text).without = e;
      });
      if (!assertKeys.length) { el.innerHTML = '<p class="empty-state">NO ASSERTIONS FOUND</p>'; return; }

      const cols = [];
      if (withRun) cols.push({ key: 'with_skill', run: withRun, label: 'WITH SKILL', cls: 'col-with' });
      if (withoutRun) cols.push({ key: 'without_skill', run: withoutRun, label: 'W/O SKILL', cls: 'col-without' });

      let html = `<table class="compare-table"><thead><tr>
        <th class="th-assertion">ASSERTION</th>
        ${cols.map(c => `<th class="th-cfg ${c.cls}">${esc(c.label)}</th>`).join('')}
      </tr></thead><tbody>`;

      assertKeys.forEach((text) => {
        const row = assertMap.get(text);
        html += `<tr><td class="td-text">${esc(text)}</td>`;
        cols.forEach(c => {
          const e = c.key === 'with_skill' ? row.with : row.without;
          const cls = e ? (e.passed ? 'td-pass' : 'td-fail') : 'td-na';
          html += `<td class="td-result ${cls}">
            <span class="res-icon">${e ? (e.passed ? '[OK]' : '[!!]') : '[--]'}</span>
            ${e?.evidence ? `<div class="res-ev">${esc(e.evidence)}</div>` : ''}
          </td>`;
        });
        html += '</tr>';
      });

      const wt = withRun?.timing?.total_tokens || 0;
      const wot = withoutRun?.timing?.total_tokens || 0;
      let td = '', tdCls = '';
      if (wt && wot) {
        const d = ((wt - wot) / wot * 100).toFixed(0);
        td = (d > 0 ? '+' : '') + d + '%';
        tdCls = d > 0 ? 'delta-pos' : 'delta-neg';
      }
      html += `<tr class="tr-metric"><td class="td-metric-lbl">TOKENS</td>`;
      cols.forEach(c => {
        const tok = c.run?.timing?.total_tokens || 0;
        html += `<td class="td-metric">${tok.toLocaleString('fr-FR')}${c.key==='with_skill'&&td?` <span class="${tdCls}">${td}</span>`:''}</td>`;
      });
      html += '</tr>';

      const wts = withRun?.timing?.total_duration_seconds, wots = withoutRun?.timing?.total_duration_seconds;
      if (wts || wots) {
        html += `<tr class="tr-metric"><td class="td-metric-lbl">DURATION</td>`;
        cols.forEach(c => { html += `<td class="td-metric">${c.run?.timing?.total_duration_seconds||'—'}s</td>`; });
        html += '</tr>';
      }

      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function renderCurrentEval() {
      const g = evalGroups[currentEvalIndex];
      if (!g) return;
      const nameEl = document.getElementById('eval-name');
      if (nameEl) nameEl.textContent = '>> ' + g.name;
      const promptEl = document.getElementById('eval-prompt');
      if (promptEl) promptEl.innerHTML = renderMd(g.prompt || '');
      const withRun = g.configs['with_skill'];
      const withoutRun = g.configs['without_skill'];
      renderStatsStrip(withRun, withoutRun);
      renderCompareTable(g, withRun, withoutRun);
      const osec = document.getElementById('outputs-section');
      if (osec) {
        const wout = withRun?.outputs_list || [];
        const wout2 = withoutRun?.outputs_list || [];
        if (!wout.length && !wout2.length) { osec.innerHTML = ''; }
        else {
          let oh = '<div class="outputs-row">';
          if (wout.length) { oh += '<span class="out-lbl">WITH:</span>'; wout.forEach(f => { oh += `<button class="output-btn" onclick="openModal('${esc(f)}','${esc(withRun.run_id)}')">[${esc(f)} ↗]</button>`; }); }
          if (wout2.length) { oh += '<span class="out-sep">|</span><span class="out-lbl">W/O:</span>'; wout2.forEach(f => { oh += `<button class="output-btn" onclick="openModal('${esc(f)}','${esc(withoutRun.run_id)}')">[${esc(f)} ↗]</button>`; }); }
          oh += '</div>';
          osec.innerHTML = oh;
        }
      }
      const tw = document.getElementById('transcript-with'); if (tw) tw.innerHTML = renderMd(withRun?.transcript || '');
      const two = document.getElementById('transcript-without'); if (two) two.innerHTML = renderMd(withoutRun?.transcript || '');
      const fbw = document.getElementById('fb-with'); if (fbw && withRun) { fbw.value = feedback[withRun.run_id]||''; fbw.setAttribute('data-run', withRun.run_id); }
      const fbwo = document.getElementById('fb-without'); if (fbwo && withoutRun) { fbwo.value = feedback[withoutRun.run_id]||''; fbwo.setAttribute('data-run', withoutRun.run_id); }
    }

    function toggleSection(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }

    function goToEval(index) {
      if (index < 0 || index >= evalGroups.length) return;
      currentEvalIndex = index;
      renderCurrentEval(); updateSidebar(); updateNavBar();
      const mc = document.getElementById('main-content'); if (mc) mc.scrollTop = 0;
    }
    function navigate(dir) { goToEval(currentEvalIndex + dir); }
    function updateNavBar() {
      const ctr = document.getElementById('nav-counter'); if (ctr) ctr.textContent = `[${currentEvalIndex+1}/${evalGroups.length}]`;
      const p = document.getElementById('btn-prev'); const n = document.getElementById('btn-next');
      if (p) p.disabled = currentEvalIndex === 0; if (n) n.disabled = currentEvalIndex === evalGroups.length-1;
    }

    function buildSidebar() {
      const sb = document.getElementById('sidebar'); if (!sb) return;
      const label = sb.querySelector('.sidebar-label');
      const items = evalGroups.map((g,i) => {
        const withPR = getPassRate(g.configs['with_skill']);
        const anyFail = Object.values(g.configs).some(r => (r?.grading?.expectations||[]).some(x=>!x.passed));
        const allPass = Object.values(g.configs).every(r => { const e=r?.grading?.expectations||[]; return e.length>0&&e.every(x=>x.passed); });
        const badge = allPass ? '[OK]' : anyFail ? '[!!]' : '[--]';
        const badgeCls = allPass ? 'badge-ok' : anyFail ? 'badge-fail' : 'badge-neutral';
        return `<div class="sidebar-item ${i===0?'active':''}" id="sbi-${i}" onclick="goToEval(${i})">
          <span class="sbi-badge ${badgeCls}">${badge}</span>
          <span class="sbi-name">${esc(g.name)}</span>
          ${withPR !== null ? `<span class="sbi-pr">${withPR}%</span>` : ''}
        </div>`;
      }).join('');
      sb.innerHTML = ''; if (label) sb.appendChild(label); sb.insertAdjacentHTML('beforeend', items);
    }
    function updateSidebar() {
      evalGroups.forEach((_,i) => { const el=document.getElementById(`sbi-${i}`); if(el) el.classList.toggle('active', i===currentEvalIndex); });
    }

    function switchTab(name) {
      ['outputs','benchmark'].forEach(t => {
        const p=document.getElementById(`tab-${t}`); if(p) p.classList.toggle('hidden', t!==name);
        const b=document.querySelector(`[data-tab="${t}"]`); if(b) b.classList.toggle('active', t===name);
      });
      const nb=document.getElementById('nav-bar'); if(nb) nb.classList.toggle('hidden', name!=='outputs');
      if(name==='benchmark') renderBenchmark();
    }

    function saveFeedback(runId, value) { if (!runId) return; feedback[runId] = value; showStatus('SAVED'); }
    function showStatus(msg) { const el=document.getElementById('save-status'); if(!el) return; el.textContent=msg; setTimeout(()=>{el.textContent='';},1500); }
    function submitReviews() {
      const reviews = EVAL_DATA.map(run => ({ run_id: run.run_id, feedback: feedback[run.run_id]||'', timestamp: new Date().toISOString() }));
      const blob = new Blob([JSON.stringify({reviews, status:'complete'},null,2)], {type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='feedback.json'; a.click(); showStatus('EXPORTED');
    }

    let chartsInit = false;
    function renderBenchmark() {
      const bk = BENCHMARK_DATA;
      const el = document.getElementById('benchmark-content');
      if (!bk?.run_summary) { if(el) el.innerHTML='<p class="empty-state">BENCHMARK DATA NOT FOUND</p>'; return; }
      const summary = bk.run_summary;
      const configs = Object.keys(summary).filter(k => k !== 'delta');
      const efficiency = bk.token_efficiency || {};
      const notes = bk.analyst_notes || [];
      const meta = bk.metadata || {};
      let html = `<div class="bk-meta">> ${esc(meta.skill_name||SKILL_NAME)} | ${esc(meta.executor_model||'—')} | ${esc(meta.timestamp||'—')} | ${(meta.evals_run||[]).length} EVALS</div>`;
      html += '<div class="kpi-grid">';
      configs.forEach(cfg => {
        const s=summary[cfg]||{};
        const tokens=Math.round(s.tokens?.mean||0).toLocaleString('fr-FR');
        const pr=Math.round((s.pass_rate?.mean||0)*100);
        const time=(s.time_seconds?.mean||0).toFixed(1);
        const eff=efficiency[cfg];
        html+=`<div class="kpi-card"><div class="kpi-cfg">${esc(cfg.replace(/_/g,' ').toUpperCase())}</div><div class="kpi-tokens">${tokens}</div><div class="kpi-stats"><span class="kpi-pass">${pr}%</span><span class="kpi-time">${time}s</span></div>${eff?`<div class="kpi-rating rating-${esc(eff.rating)}">[${esc(eff.rating.toUpperCase())}]</div>`:''}</div>`;
      });
      html += '</div>';
      html += `<div class="charts-row"><div class="chart-wrap"><canvas id="chart-tokens"></canvas></div><div class="chart-wrap"><canvas id="chart-pass"></canvas></div></div>`;
      html += `<div class="bk-section"><div class="bk-title">// COMPARISON</div><table class="bk-table"><thead><tr><th>METRIC</th>${configs.map(c=>`<th>${esc(c.replace(/_/g,' ').toUpperCase())}</th>`).join('')}</tr></thead><tbody>`;
      [{label:'TOKENS',key:'tokens',fmt:v=>Math.round(v).toLocaleString('fr-FR')},{label:'PASS RATE',key:'pass_rate',fmt:v=>`${Math.round(v*100)}%`},{label:'TIME (S)',key:'time_seconds',fmt:v=>v.toFixed(1)}].forEach(row=>{
        html+=`<tr><td class="bk-label">${row.label}</td>${configs.map(cfg=>{const s=summary[cfg]?.[row.key]||{};return`<td>${row.fmt(s.mean||0)} <span class="bk-std">±${row.fmt(s.stddev||0)}</span></td>`;}).join('')}</tr>`;
      });
      const delta=summary.delta||{};
      const fd=Object.values(delta)[0];
      if(fd){html+=`<tr><td class="bk-label">DELTA TOK</td><td colspan="${configs.length}"><span class="${fd.tokens?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(fd.tokens||'—')}</span> ${fd.rating?`<span class="rating-badge rating-${esc(fd.rating)}">[${esc(fd.rating.toUpperCase())}]</span>`:''}</td></tr>`;}
      html += '</tbody></table></div>';
      if(Object.keys(efficiency).length){
        html+=`<div class="bk-section"><div class="bk-title">// TOKEN EFFICIENCY</div><table class="bk-table"><thead><tr><th>CONFIG</th><th>REF</th><th>Δ TOKENS</th><th>Δ PASS</th><th>TOK/PT</th><th>RATING</th></tr></thead><tbody>`;
        Object.entries(efficiency).forEach(([cfg,eff])=>{
          html+=`<tr><td>${esc(cfg)}</td><td class="bk-label">${esc(eff.vs)}</td><td class="${eff.tokens_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.tokens_delta)}</td><td class="${eff.pass_rate_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.pass_rate_delta)}</td><td>${eff.tokens_per_pass_rate_point?.toLocaleString('fr-FR')||'—'}</td><td>[${esc(eff.rating?.toUpperCase()||'')}]</td></tr>`;
        });
        html+='</tbody></table></div>';
      }
      if(notes.length){html+=`<div class="bk-section"><div class="bk-title">// ANALYST NOTES</div><ul class="notes-list">${notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;}
      if(el) el.innerHTML = html;
      if(!chartsInit && typeof Chart !== 'undefined'){
        chartsInit = true;
        const labels=configs.map(c=>c.replace(/_/g,' '));
        const colors=['rgba(255,176,0,0.6)','rgba(255,85,0,0.6)','rgba(102,255,136,0.6)'];
        const borders=['#FFB000','#FF5500','#66FF88'];
        const opts=(title)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:title,color:'#FFB000',font:{size:11,family:'Share Tech Mono, monospace',weight:'400'}}},scales:{x:{ticks:{color:'#805800',font:{family:'Share Tech Mono, monospace',size:10}},grid:{color:'#2C1F00'}},y:{ticks:{color:'#805800',font:{family:'Share Tech Mono, monospace',size:10}},grid:{color:'#2C1F00'}}}});
        new Chart(document.getElementById('chart-tokens'),{type:'bar',data:{labels,datasets:[{data:configs.map(c=>Math.round(summary[c]?.tokens?.mean||0)),backgroundColor:colors,borderColor:borders,borderWidth:1}]},options:opts('TOKENS MOYENS')});
        new Chart(document.getElementById('chart-pass'),{type:'bar',data:{labels,datasets:[{data:configs.map(c=>Math.round((summary[c]?.pass_rate?.mean||0)*100)),backgroundColor:colors,borderColor:borders,borderWidth:1}]},options:opts('PASS RATE %')});
      }
    }

    document.addEventListener('keydown', e => {
      if(modalIsOpen){ if(e.key==='Escape') closeModal(); return; }
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(e.key==='ArrowLeft'||e.key==='k') navigate(-1);
      if(e.key==='ArrowRight'||e.key==='j') navigate(1);
      if(e.key==='b'){ const bk=document.getElementById('tab-benchmark'); switchTab(bk?.classList.contains('hidden')?'benchmark':'outputs'); }
      if(e.key==='Escape') switchTab('outputs');
    });

    buildSidebar();
    renderCurrentEval();
    updateNavBar();
  </script>

</body>
</html>
