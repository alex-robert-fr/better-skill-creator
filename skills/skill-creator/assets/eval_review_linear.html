<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__SKILL_NAME_PLACEHOLDER__ — Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:       #070707;
      --s1:       #0D0D0D;
      --s2:       #111;
      --b1:       #1A1A1A;
      --b2:       #262626;
      --text:     #EDEDED;
      --t2:       #888;
      --t3:       #555;
      --t4:       #333;
      --accent:   #7C6AF7;
      --a-dim:    rgba(124,106,247,0.1);
      --with:     #5B89FF;
      --without:  #FF7A7A;
      --pass:     #4ED87A;
      --pass-d:   rgba(78,216,122,0.12);
      --fail:     #FF5757;
      --fail-d:   rgba(255,87,87,0.1);
      --warn:     #F5C842;
      --mono:     'DM Mono', 'SF Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 99px; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    .app-header {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      border-bottom: 1px solid var(--b1);
      z-index: 20;
    }
    .header-skill {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--t3);
      letter-spacing: 0.04em;
    }
    .header-sep { width: 1px; height: 14px; background: var(--b2); flex-shrink: 0; }
    #save-status { font-family: var(--mono); font-size: 11px; color: var(--pass); min-width: 60px; }
    .header-spacer { flex: 1; }
    .tab-nav { display: flex; align-items: stretch; height: 100%; }
    .tab-nav button {
      background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      color: var(--t4); height: 100%; padding: 0 16px; cursor: pointer;
      border-bottom: 2px solid transparent; transition: color 100ms, border-color 100ms;
    }
    .tab-nav button:hover { color: var(--t2); }
    .tab-nav button.active { color: var(--text); border-bottom-color: var(--accent); }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .app-body { display: flex; flex: 1; overflow: hidden; position: relative; }

    .tab-panel { display: flex; flex: 1; overflow: hidden; }
    .tab-panel.hidden { display: none !important; }

    .outputs-panel { display: flex; }

    #sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--b1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--t4);
      padding: 14px 18px 10px;
      flex-shrink: 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 18px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 80ms, border-color 80ms;
    }
    .sidebar-item:hover { background: var(--s1); }
    .sidebar-item.active { border-left-color: var(--accent); background: var(--a-dim); }
    .sbi-dot {
      width: 5px; height: 5px;
      border-radius: 50%; flex-shrink: 0;
    }
    .dot-pass { background: var(--pass); }
    .dot-fail { background: var(--fail); }
    .dot-neutral { background: var(--t4); }
    .sbi-name {
      flex: 1;
      font-size: 12px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item.active .sbi-name { color: var(--text); }
    .sbi-pr {
      font-family: var(--mono);
      font-size: 10px;
      flex-shrink: 0;
    }
    .pr-100 { color: var(--pass); }
    .pr-mid { color: var(--warn); }
    .pr-low { color: var(--fail); }

    /* ── MAIN CONTENT ────────────────────────────────────── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px 80px;
    }

    .eval-header { margin-bottom: 28px; }

    #eval-name {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--t4);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    #eval-prompt {
      font-size: 13px;
      color: var(--t3);
      line-height: 1.6;
    }
    #eval-prompt p { margin-bottom: 6px; }
    #eval-prompt p:last-child { margin-bottom: 0; }

    /* ── STATS STRIP ─────────────────────────────────────── */
    #stats-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border: 1px solid var(--b1);
      border-radius: 5px;
      background: var(--s1);
    }
    .stat-lbl {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--t4);
    }
    .stat-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--t2);
    }
    .stat-delta { font-family: var(--mono); font-size: 11px; }
    .stat-chip.delta-pos { border-color: rgba(255,87,87,0.2); }
    .stat-chip.delta-neg { border-color: rgba(78,216,122,0.2); }
    .delta-pos { color: var(--fail); }
    .delta-neg { color: var(--pass); }

    /* ── COMPARE TABLE ───────────────────────────────────── */
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 32px;
    }
    .compare-table th {
      text-align: left;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--t4);
      border-bottom: 1px solid var(--b1);
    }
    .th-assertion { width: 50%; }
    .col-with { color: var(--with) !important; }
    .col-without { color: var(--without) !important; }

    @keyframes assertIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tr-assert { animation: assertIn 200ms both; }

    .td-text {
      padding: 11px 16px;
      border-bottom: 1px solid var(--b1);
      font-size: 13px;
      color: var(--t2);
      vertical-align: top;
      line-height: 1.5;
    }
    .td-result {
      padding: 11px 16px;
      border-bottom: 1px solid var(--b1);
      vertical-align: top;
      width: 18%;
    }
    .td-pass .res-icon {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--pass);
    }
    .td-fail .res-icon {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fail);
    }
    .td-na .res-icon {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--t4);
    }
    .res-ev {
      font-size: 11px;
      color: var(--t4);
      margin-top: 5px;
      line-height: 1.5;
    }

    .tr-metric td {
      padding: 8px 16px;
      border-bottom: 1px solid var(--b1);
    }
    .td-metric-lbl {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--t4);
    }
    .td-metric {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--t3);
    }
    .td-metric .delta-pos, .td-metric .delta-neg {
      font-size: 10px;
      margin-left: 4px;
    }

    /* ── OUTPUTS ─────────────────────────────────────────── */
    .outputs-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }
    .out-lbl {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--t4);
    }
    .out-sep { width: 1px; height: 14px; background: var(--b1); }
    .output-btn {
      background: none;
      border: 1px solid var(--b1);
      color: var(--t3);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 100ms, border-color 100ms;
    }
    .output-btn:hover { color: var(--t2); border-color: var(--b2); }

    /* ── SECTIONS ─────────────────────────────────────────── */
    .section-block { margin-bottom: 28px; }

    .section-hdr {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--t4);
      padding: 10px 0;
      border-top: 1px solid var(--b1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .collapsible-toggle { cursor: pointer; transition: color 100ms; }
    .collapsible-toggle:hover { color: var(--t3); }
    .arrow { font-size: 10px; color: var(--t4); }

    .collapsible { max-height: 0; overflow: hidden; transition: max-height 220ms ease; }
    .collapsible.open { max-height: 4000px; }

    .transcript-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      padding-top: 16px;
    }
    .col-sub-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--t4);
      margin-bottom: 10px;
    }

    .feedback-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      padding-top: 12px;
    }
    .feedback-area {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--b1);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      padding: 8px 0;
      resize: none;
      min-height: 60px;
      outline: none;
      transition: border-color 120ms;
    }
    .feedback-area::placeholder { color: var(--t4); }
    .feedback-area:focus { border-bottom-color: var(--b2); }

    /* ── MARKDOWN ────────────────────────────────────────── */
    .md-render { font-size: 13px; color: var(--t2); line-height: 1.75; }
    .md-render p { margin-bottom: 8px; }
    .md-render p:last-child { margin-bottom: 0; }
    .md-render pre { background: var(--s1); padding: 12px 14px; border-radius: 4px; overflow-x: auto; margin: 8px 0; }
    .md-render code { font-family: var(--mono); font-size: 11px; color: var(--accent); }
    .md-render pre code { color: var(--t2); }
    .md-render h1 { font-size: 15px; font-weight: 500; margin: 16px 0 6px; }
    .md-render h2 { font-size: 13px; font-weight: 500; margin: 12px 0 4px; }
    .md-render ul, .md-render ol { padding-left: 18px; margin: 6px 0; }
    .md-render li { margin: 3px 0; }
    .md-render blockquote { border-left: 2px solid var(--b2); padding-left: 12px; margin: 8px 0; color: var(--t3); }

    .empty-state { font-size: 13px; color: var(--t4); padding: 16px 0; }

    /* ── NAV BAR ─────────────────────────────────────────── */
    #nav-bar {
      position: absolute;
      bottom: 0; left: 220px; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-top: 1px solid var(--b1);
      background: var(--bg);
      z-index: 20;
    }
    #nav-bar.hidden { display: none !important; }
    .nav-btn {
      background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--t3);
      cursor: pointer; padding: 5px 12px; border-radius: 4px;
      transition: color 100ms, background 100ms;
    }
    .nav-btn:hover:not(:disabled) { color: var(--text); background: var(--s1); }
    .nav-btn:disabled { opacity: 0.22; cursor: default; }
    #nav-counter {
      font-family: var(--mono); font-size: 11px; color: var(--t4);
      min-width: 48px; text-align: center;
    }
    .nav-sep { width: 1px; height: 14px; background: var(--b1); }
    .nav-submit {
      background: var(--accent); border: none;
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; padding: 6px 16px; border-radius: 4px; transition: opacity 100ms;
    }
    .nav-submit:hover { opacity: 0.8; }
    .nav-hints { font-family: var(--mono); font-size: 10px; color: var(--t4); }

    /* ── BENCHMARK ───────────────────────────────────────── */
    #tab-benchmark { overflow-y: auto; padding: 48px 56px; display: block !important; }
    #benchmark-content { max-width: 820px; display: flex; flex-direction: column; gap: 40px; }
    .bk-meta { font-family: var(--mono); font-size: 11px; color: var(--t4); letter-spacing: 0.02em; }
    .kpi-grid { display: flex; gap: 14px; flex-wrap: wrap; }
    .kpi-card {
      flex: 1; min-width: 180px;
      border: 1px solid var(--b1); border-radius: 6px;
      padding: 18px 22px; display: flex; flex-direction: column; gap: 8px;
      background: var(--s1); transition: border-color 100ms;
    }
    .kpi-card:hover { border-color: var(--b2); }
    .kpi-cfg { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t4); }
    .kpi-tokens { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
    .kpi-stats { display: flex; gap: 12px; font-family: var(--mono); font-size: 12px; }
    .kpi-pass { color: var(--pass); }
    .kpi-time { color: var(--t3); }
    .kpi-rating { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-wrap {
      border: 1px solid var(--b1); border-radius: 6px;
      padding: 18px; height: 200px; position: relative; background: var(--s1);
    }
    .bk-section { display: flex; flex-direction: column; gap: 14px; }
    .bk-title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t4); }
    .bk-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .bk-table th {
      text-align: left; padding: 8px 14px;
      font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--t4);
      border-bottom: 1px solid var(--b1);
    }
    .bk-table td { padding: 10px 14px; border-bottom: 1px solid var(--b1); vertical-align: middle; }
    .bk-table tr:last-child td { border-bottom: none; }
    .bk-table tr:hover td { background: var(--s1); }
    .bk-label { color: var(--t3) !important; font-size: 12px; }
    .bk-std { color: var(--t4); font-family: var(--mono); font-size: 11px; }
    .rating-badge { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 3px; }
    .rating-excellent, .rating-efficace { background: var(--pass-d); color: var(--pass); }
    .rating-neutre, .rating-moderate { background: rgba(245,200,66,0.1); color: var(--warn); }
    .rating-couteux, .rating-poor { background: var(--fail-d); color: var(--fail); }
    .notes-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .notes-list li { font-size: 13px; color: var(--t3); line-height: 1.6; padding-left: 16px; position: relative; }
    .notes-list li::before { content: '—'; position: absolute; left: 0; color: var(--t4); }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 40px;
      backdrop-filter: blur(4px);
    }
    .modal.hidden { display: none !important; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-inner {
      background: var(--s1); border: 1px solid var(--b2); border-radius: 8px;
      width: 100%; max-width: 860px; max-height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: modalIn 180ms ease both;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; border-bottom: 1px solid var(--b1); flex-shrink: 0;
    }
    #modal-title { font-family: var(--mono); font-size: 12px; color: var(--t2); letter-spacing: 0.02em; }
    .modal-close {
      background: none; border: none; color: var(--t3); font-size: 14px;
      cursor: pointer; padding: 3px; border-radius: 3px; transition: color 100ms, background 100ms;
    }
    .modal-close:hover { color: var(--text); background: var(--s2); }
    #modal-body { overflow-y: auto; flex: 1; padding: 22px; }
    .code-block { font-family: var(--mono); font-size: 12px; color: var(--t3); line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
    .md-render { font-size: 13px; color: var(--text); line-height: 1.75; }
  </style>
</head>
<body>

  <header class="app-header">
    <span class="header-skill">__SKILL_NAME_PLACEHOLDER__</span>
    <div class="header-sep"></div>
    <span id="save-status"></span>
    <div class="header-spacer"></div>
    <nav class="tab-nav">
      <button data-tab="outputs" onclick="switchTab('outputs')" class="active">Outputs</button>
      <button data-tab="benchmark" onclick="switchTab('benchmark')">Benchmark</button>
    </nav>
  </header>

  <div class="app-body">

    <div id="tab-outputs" class="tab-panel outputs-panel">

      <aside id="sidebar">
        <div class="sidebar-label">Evaluations</div>
      </aside>

      <div id="main-content">

        <div class="eval-header">
          <div id="eval-name"></div>
          <div id="eval-prompt"></div>
        </div>

        <div id="stats-strip"></div>
        <div id="compare-table-wrap"></div>
        <div id="outputs-section"></div>

        <div class="section-block">
          <div class="section-hdr collapsible-toggle" onclick="toggleSection('tr-section')">
            Transcripts <span class="arrow">▾</span>
          </div>
          <div class="collapsible" id="tr-section">
            <div class="transcript-cols">
              <div>
                <div class="col-sub-label">with skill</div>
                <div class="md-render" id="transcript-with"></div>
              </div>
              <div>
                <div class="col-sub-label">without skill</div>
                <div class="md-render" id="transcript-without"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="section-block">
          <div class="section-hdr">Feedback</div>
          <div class="feedback-row">
            <div>
              <div class="col-sub-label">with skill</div>
              <textarea class="feedback-area" id="fb-with" placeholder="Notes sur ce run…"
                oninput="saveFeedback(this.getAttribute('data-run'),this.value)" data-run=""></textarea>
            </div>
            <div>
              <div class="col-sub-label">without skill</div>
              <textarea class="feedback-area" id="fb-without" placeholder="Notes sur ce run…"
                oninput="saveFeedback(this.getAttribute('data-run'),this.value)" data-run=""></textarea>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="tab-benchmark" class="tab-panel hidden">
      <div id="benchmark-content"></div>
    </div>

    <nav id="nav-bar">
      <button id="btn-prev" class="nav-btn" onclick="navigate(-1)">← Précédent</button>
      <span id="nav-counter"></span>
      <button id="btn-next" class="nav-btn" onclick="navigate(1)">Suivant →</button>
      <div class="nav-sep"></div>
      <button class="nav-submit" onclick="submitReviews()">Soumettre</button>
      <div class="nav-sep"></div>
      <span class="nav-hints">j/k · ← → · b · Échap</span>
    </nav>

  </div>

  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;
    const BENCHMARK_DATA = __BENCHMARK_DATA_PLACEHOLDER__;
    const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
    const PREVIOUS_DATA = __PREVIOUS_DATA_PLACEHOLDER__;

    function esc(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function renderMd(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined') return marked.parse(text);
      return '<pre style="white-space:pre-wrap">' + esc(text) + '</pre>';
    }

    const runOutputsMap = {};
    EVAL_DATA.forEach(r => { runOutputsMap[r.run_id] = r.outputs_content || {}; });

    let modalIsOpen = false;
    function openModal(filename, runId) {
      const content = runOutputsMap[runId]?.[filename] || '(contenu non disponible)';
      document.getElementById('modal-title').textContent = filename;
      const body = document.getElementById('modal-body');
      if (filename.endsWith('.md')) {
        body.innerHTML = '<div class="md-render">' + renderMd(content) + '</div>';
      } else if (filename.endsWith('.json')) {
        try { body.innerHTML = '<pre class="code-block">' + esc(JSON.stringify(JSON.parse(content),null,2)) + '</pre>'; }
        catch { body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>'; }
      } else {
        body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>';
      }
      document.getElementById('modal').classList.remove('hidden');
      modalIsOpen = true;
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); modalIsOpen = false; }
    function handleModalClick(e) { if (e.target.id === 'modal') closeModal(); }

    function buildEvalGroups(data) {
      const map = new Map();
      data.forEach(run => {
        if (!map.has(run.eval_name)) map.set(run.eval_name, { name: run.eval_name, prompt: run.prompt, configs: {} });
        map.get(run.eval_name).configs[run.configuration] = run;
      });
      return Array.from(map.values());
    }
    const evalGroups = buildEvalGroups(EVAL_DATA);
    let currentEvalIndex = 0;
    const feedback = {};
    EVAL_DATA.forEach(r => { feedback[r.run_id] = ''; });

    function getPassRate(run) {
      const exp = run?.grading?.expectations || [];
      if (!exp.length) return null;
      return Math.round(exp.filter(e => e.passed).length / exp.length * 100);
    }

    function renderStatsStrip(withRun, withoutRun) {
      const el = document.getElementById('stats-strip');
      if (!el) return;
      const withTokens = withRun?.timing?.total_tokens || 0;
      const withoutTokens = withoutRun?.timing?.total_tokens || 0;
      const withTime = withRun?.timing?.total_duration_seconds;
      const withoutTime = withoutRun?.timing?.total_duration_seconds;
      const withPR = getPassRate(withRun);
      const withoutPR = getPassRate(withoutRun);
      let tokenDelta = '', tDeltaCls = '';
      if (withTokens && withoutTokens) {
        const d = ((withTokens - withoutTokens) / withoutTokens * 100).toFixed(0);
        tokenDelta = (d > 0 ? '+' : '') + d + '%';
        tDeltaCls = d > 0 ? 'delta-pos' : 'delta-neg';
      }
      el.innerHTML = `
        <div class="stat-chip"><span class="stat-lbl">with</span><span class="stat-val">${withTokens.toLocaleString('fr-FR')} tok</span></div>
        <div class="stat-chip"><span class="stat-lbl">without</span><span class="stat-val">${withoutTokens.toLocaleString('fr-FR')} tok</span></div>
        ${tokenDelta ? `<div class="stat-chip ${tDeltaCls}"><span class="stat-lbl">delta</span><span class="stat-val ${tDeltaCls}">${tokenDelta}</span></div>` : ''}
        ${withTime || withoutTime ? `<div class="stat-chip"><span class="stat-lbl">time</span><span class="stat-val">${withTime||'—'}s / ${withoutTime||'—'}s</span></div>` : ''}
        ${withPR !== null ? `<div class="stat-chip"><span class="stat-lbl">pass rate</span><span class="stat-val">${withPR}% / ${withoutPR !== null ? withoutPR+'%' : '—'}</span></div>` : ''}
      `;
    }

    function renderCompareTable(g, withRun, withoutRun) {
      const el = document.getElementById('compare-table-wrap');
      if (!el) return;
      const withExp = withRun?.grading?.expectations || [];
      const withoutExp = withoutRun?.grading?.expectations || [];
      const assertKeys = [];
      const assertMap = new Map();
      withExp.forEach(e => {
        if (!assertMap.has(e.text)) { assertKeys.push(e.text); assertMap.set(e.text, {with: null, without: null}); }
        assertMap.get(e.text).with = e;
      });
      withoutExp.forEach(e => {
        if (!assertMap.has(e.text)) { assertKeys.push(e.text); assertMap.set(e.text, {with: null, without: null}); }
        assertMap.get(e.text).without = e;
      });
      if (!assertKeys.length) { el.innerHTML = '<p class="empty-state">Aucune assertion disponible</p>'; return; }

      const cols = [];
      if (withRun) cols.push({ key: 'with_skill', run: withRun, label: 'with skill', cls: 'col-with' });
      if (withoutRun) cols.push({ key: 'without_skill', run: withoutRun, label: 'without skill', cls: 'col-without' });

      let html = `<table class="compare-table"><thead><tr>
        <th class="th-assertion">Assertion</th>
        ${cols.map(c => `<th class="th-cfg ${c.cls}">${esc(c.label)}</th>`).join('')}
      </tr></thead><tbody>`;

      assertKeys.forEach((text, i) => {
        const row = assertMap.get(text);
        html += `<tr class="tr-assert" style="animation-delay:${i*25}ms">
          <td class="td-text">${esc(text)}</td>`;
        cols.forEach(c => {
          const e = c.key === 'with_skill' ? row.with : row.without;
          const cls = e ? (e.passed ? 'td-pass' : 'td-fail') : 'td-na';
          html += `<td class="td-result ${cls}">
            <span class="res-icon">${e ? (e.passed ? '✓' : '✗') : '—'}</span>
            ${e?.evidence ? `<div class="res-ev">${esc(e.evidence)}</div>` : ''}
          </td>`;
        });
        html += '</tr>';
      });

      // Metric rows
      const wt = withRun?.timing?.total_tokens || 0;
      const wot = withoutRun?.timing?.total_tokens || 0;
      let td = '', tdCls = '';
      if (wt && wot) {
        const d = ((wt - wot) / wot * 100).toFixed(0);
        td = (d > 0 ? '+' : '') + d + '%';
        tdCls = d > 0 ? 'delta-pos' : 'delta-neg';
      }
      html += `<tr class="tr-metric"><td class="td-metric-lbl">Tokens</td>`;
      cols.forEach(c => {
        const tok = c.run?.timing?.total_tokens || 0;
        html += `<td class="td-metric">${tok.toLocaleString('fr-FR')}${c.key==='with_skill'&&td?` <span class="${tdCls}">${td}</span>`:''}</td>`;
      });
      html += '</tr>';

      const wts = withRun?.timing?.total_duration_seconds, wots = withoutRun?.timing?.total_duration_seconds;
      if (wts || wots) {
        html += `<tr class="tr-metric"><td class="td-metric-lbl">Durée</td>`;
        cols.forEach(c => { html += `<td class="td-metric">${c.run?.timing?.total_duration_seconds||'—'}s</td>`; });
        html += '</tr>';
      }

      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function renderCurrentEval() {
      const g = evalGroups[currentEvalIndex];
      if (!g) return;
      const nameEl = document.getElementById('eval-name');
      if (nameEl) nameEl.textContent = g.name;
      const promptEl = document.getElementById('eval-prompt');
      if (promptEl) promptEl.innerHTML = renderMd(g.prompt || '');
      const withRun = g.configs['with_skill'];
      const withoutRun = g.configs['without_skill'];
      renderStatsStrip(withRun, withoutRun);
      renderCompareTable(g, withRun, withoutRun);
      // Outputs
      const osec = document.getElementById('outputs-section');
      if (osec) {
        const wout = withRun?.outputs_list || [];
        const wout2 = withoutRun?.outputs_list || [];
        if (!wout.length && !wout2.length) { osec.innerHTML = ''; }
        else {
          let oh = '<div class="outputs-row">';
          if (wout.length) { oh += '<span class="out-lbl">with:</span>'; wout.forEach(f => { oh += `<button class="output-btn" onclick="openModal('${esc(f)}','${esc(withRun.run_id)}')">${esc(f)} ↗</button>`; }); }
          if (wout2.length) { oh += '<div class="out-sep"></div><span class="out-lbl">without:</span>'; wout2.forEach(f => { oh += `<button class="output-btn" onclick="openModal('${esc(f)}','${esc(withoutRun.run_id)}')">${esc(f)} ↗</button>`; }); }
          oh += '</div>';
          osec.innerHTML = oh;
        }
      }
      const tw = document.getElementById('transcript-with'); if (tw) tw.innerHTML = renderMd(withRun?.transcript || '');
      const two = document.getElementById('transcript-without'); if (two) two.innerHTML = renderMd(withoutRun?.transcript || '');
      const fbw = document.getElementById('fb-with'); if (fbw && withRun) { fbw.value = feedback[withRun.run_id]||''; fbw.setAttribute('data-run', withRun.run_id); }
      const fbwo = document.getElementById('fb-without'); if (fbwo && withoutRun) { fbwo.value = feedback[withoutRun.run_id]||''; fbwo.setAttribute('data-run', withoutRun.run_id); }
    }

    function toggleSection(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }

    function goToEval(index) {
      if (index < 0 || index >= evalGroups.length) return;
      currentEvalIndex = index;
      renderCurrentEval(); updateSidebar(); updateNavBar();
      const mc = document.getElementById('main-content'); if (mc) mc.scrollTop = 0;
    }
    function navigate(dir) { goToEval(currentEvalIndex + dir); }
    function updateNavBar() {
      const ctr = document.getElementById('nav-counter'); if (ctr) ctr.textContent = `${currentEvalIndex+1} / ${evalGroups.length}`;
      const p = document.getElementById('btn-prev'); const n = document.getElementById('btn-next');
      if (p) p.disabled = currentEvalIndex === 0; if (n) n.disabled = currentEvalIndex === evalGroups.length-1;
    }

    function buildSidebar() {
      const sb = document.getElementById('sidebar'); if (!sb) return;
      const label = sb.querySelector('.sidebar-label');
      const items = evalGroups.map((g,i) => {
        const withPR = getPassRate(g.configs['with_skill']);
        const anyFail = Object.values(g.configs).some(r => (r?.grading?.expectations||[]).some(x=>!x.passed));
        const allPass = Object.values(g.configs).every(r => { const e=r?.grading?.expectations||[]; return e.length>0&&e.every(x=>x.passed); });
        const dotCls = allPass ? 'dot-pass' : anyFail ? 'dot-fail' : 'dot-neutral';
        const prCls = withPR === 100 ? 'pr-100' : (withPR !== null && withPR >= 60) ? 'pr-mid' : 'pr-low';
        return `<div class="sidebar-item ${i===0?'active':''}" id="sbi-${i}" onclick="goToEval(${i})">
          <span class="sbi-dot ${dotCls}"></span>
          <span class="sbi-name">${esc(g.name)}</span>
          ${withPR !== null ? `<span class="sbi-pr ${prCls}">${withPR}%</span>` : ''}
        </div>`;
      }).join('');
      sb.innerHTML = ''; if (label) sb.appendChild(label); sb.insertAdjacentHTML('beforeend', items);
    }
    function updateSidebar() {
      evalGroups.forEach((_,i) => { const el=document.getElementById(`sbi-${i}`); if(el) el.classList.toggle('active', i===currentEvalIndex); });
    }

    function switchTab(name) {
      ['outputs','benchmark'].forEach(t => {
        const p=document.getElementById(`tab-${t}`); if(p) p.classList.toggle('hidden', t!==name);
        const b=document.querySelector(`[data-tab="${t}"]`); if(b) b.classList.toggle('active', t===name);
      });
      const nb=document.getElementById('nav-bar'); if(nb) nb.classList.toggle('hidden', name!=='outputs');
      if(name==='benchmark') renderBenchmark();
    }

    function saveFeedback(runId, value) { if (!runId) return; feedback[runId] = value; showStatus('saved'); }
    function showStatus(msg) { const el=document.getElementById('save-status'); if(!el) return; el.textContent=msg; setTimeout(()=>{el.textContent='';},1500); }
    function submitReviews() {
      const reviews = EVAL_DATA.map(run => ({ run_id: run.run_id, feedback: feedback[run.run_id]||'', timestamp: new Date().toISOString() }));
      const blob = new Blob([JSON.stringify({reviews, status:'complete'},null,2)], {type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='feedback.json'; a.click(); showStatus('exported');
    }

    let chartsInit = false;
    function renderBenchmark() {
      const bk = BENCHMARK_DATA;
      const el = document.getElementById('benchmark-content');
      if (!bk?.run_summary) { if(el) el.innerHTML='<p class="empty-state">Benchmark non disponible.</p>'; return; }
      const summary = bk.run_summary;
      const configs = Object.keys(summary).filter(k => k !== 'delta');
      const efficiency = bk.token_efficiency || {};
      const notes = bk.analyst_notes || [];
      const meta = bk.metadata || {};
      let html = `<div class="bk-meta">${esc(meta.skill_name||SKILL_NAME)} · ${esc(meta.executor_model||'—')} · ${esc(meta.timestamp||'—')} · ${(meta.evals_run||[]).length} evals</div>`;
      html += '<div class="kpi-grid">';
      configs.forEach(cfg => {
        const s=summary[cfg]||{};
        const tokens=Math.round(s.tokens?.mean||0).toLocaleString('fr-FR');
        const pr=Math.round((s.pass_rate?.mean||0)*100);
        const time=(s.time_seconds?.mean||0).toFixed(1);
        const eff=efficiency[cfg];
        html+=`<div class="kpi-card"><div class="kpi-cfg">${esc(cfg.replace(/_/g,' '))}</div><div class="kpi-tokens">${tokens}</div><div class="kpi-stats"><span class="kpi-pass">${pr}%</span><span class="kpi-time">${time}s</span></div>${eff?`<div class="kpi-rating rating-${esc(eff.rating)}">${esc(eff.rating)}</div>`:''}</div>`;
      });
      html += '</div>';
      html += `<div class="charts-row"><div class="chart-wrap"><canvas id="chart-tokens"></canvas></div><div class="chart-wrap"><canvas id="chart-pass"></canvas></div></div>`;
      html += `<div class="bk-section"><div class="bk-title">Comparaison</div><table class="bk-table"><thead><tr><th>Métrique</th>${configs.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('')}</tr></thead><tbody>`;
      [{label:'Tokens',key:'tokens',fmt:v=>Math.round(v).toLocaleString('fr-FR')},{label:'Pass rate',key:'pass_rate',fmt:v=>`${Math.round(v*100)}%`},{label:'Temps (s)',key:'time_seconds',fmt:v=>v.toFixed(1)}].forEach(row=>{
        html+=`<tr><td class="bk-label">${row.label}</td>${configs.map(cfg=>{const s=summary[cfg]?.[row.key]||{};return`<td>${row.fmt(s.mean||0)} <span class="bk-std">±${row.fmt(s.stddev||0)}</span></td>`;}).join('')}</tr>`;
      });
      const delta=summary.delta||{};
      const fd=Object.values(delta)[0];
      if(fd){html+=`<tr><td class="bk-label">Δ tokens</td><td colspan="${configs.length}"><span class="${fd.tokens?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(fd.tokens||'—')}</span> ${fd.rating?`<span class="rating-badge rating-${esc(fd.rating)}">${esc(fd.rating)}</span>`:''}</td></tr>`;}
      html += '</tbody></table></div>';
      if(Object.keys(efficiency).length){
        html+=`<div class="bk-section"><div class="bk-title">Token Efficiency</div><table class="bk-table"><thead><tr><th>Config</th><th>Réf.</th><th>Δ Tokens</th><th>Δ Pass Rate</th><th>Tok/pt</th><th>Rating</th></tr></thead><tbody>`;
        Object.entries(efficiency).forEach(([cfg,eff])=>{
          html+=`<tr><td>${esc(cfg)}</td><td class="bk-label">${esc(eff.vs)}</td><td class="${eff.tokens_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.tokens_delta)}</td><td class="${eff.pass_rate_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.pass_rate_delta)}</td><td>${eff.tokens_per_pass_rate_point?.toLocaleString('fr-FR')||'—'}</td><td><span class="rating-badge rating-${esc(eff.rating)}">${esc(eff.rating)}</span></td></tr>`;
        });
        html+='</tbody></table></div>';
      }
      if(notes.length){html+=`<div class="bk-section"><div class="bk-title">Observations</div><ul class="notes-list">${notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;}
      if(el) el.innerHTML = html;
      if(!chartsInit && typeof Chart !== 'undefined'){
        chartsInit = true;
        const labels=configs.map(c=>c.replace(/_/g,' '));
        const colors=['rgba(124,106,247,0.7)','rgba(255,122,122,0.7)','rgba(78,216,122,0.7)'];
        const borders=['#7C6AF7','#FF7A7A','#4ED87A'];
        const opts=(title)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:title,color:'#888',font:{size:11,family:'DM Mono, monospace',weight:'400'}}},scales:{x:{ticks:{color:'#444',font:{family:'DM Mono, monospace',size:10}},grid:{color:'#1A1A1A'}},y:{ticks:{color:'#444',font:{family:'DM Mono, monospace',size:10}},grid:{color:'#1A1A1A'}}}});
        new Chart(document.getElementById('chart-tokens'),{type:'bar',data:{labels,datasets:[{data:configs.map(c=>Math.round(summary[c]?.tokens?.mean||0)),backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:3}]},options:opts('tokens moyens')});
        new Chart(document.getElementById('chart-pass'),{type:'bar',data:{labels,datasets:[{data:configs.map(c=>Math.round((summary[c]?.pass_rate?.mean||0)*100)),backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:3}]},options:opts('pass rate %')});
      }
    }

    document.addEventListener('keydown', e => {
      if(modalIsOpen){ if(e.key==='Escape') closeModal(); return; }
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(e.key==='ArrowLeft'||e.key==='k') navigate(-1);
      if(e.key==='ArrowRight'||e.key==='j') navigate(1);
      if(e.key==='b'){ const bk=document.getElementById('tab-benchmark'); switchTab(bk?.classList.contains('hidden')?'benchmark':'outputs'); }
      if(e.key==='Escape') switchTab('outputs');
    });

    buildSidebar();
    renderCurrentEval();
    updateNavBar();
  </script>

</body>
</html>
