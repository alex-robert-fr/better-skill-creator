<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__SKILL_NAME_PLACEHOLDER__ — Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:          #070707;
      --surface:     #0E0E0E;
      --surface2:    #141414;
      --border:      #1E1E1E;
      --border2:     #282828;
      --text:        #EDEDED;
      --text2:       #999;
      --text3:       #555;
      --text4:       #333;
      --accent:      #7C6AF7;
      --accent-dim:  rgba(124,106,247,0.12);
      --with:        #5B89FF;
      --with-dim:    rgba(91,137,255,0.07);
      --without:     #FF7A7A;
      --without-dim: rgba(255,122,122,0.07);
      --pass:        #4ED87A;
      --pass-dim:    rgba(78,216,122,0.1);
      --fail:        #FF5757;
      --fail-dim:    rgba(255,87,87,0.08);
      --warn:        #F5C842;
      --mono:        'DM Mono', 'SF Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SCROLLBAR ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .app-header {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 20;
    }

    .header-skill {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .header-sep {
      width: 1px;
      height: 14px;
      background: var(--border2);
      flex-shrink: 0;
    }

    #save-status {
      font-size: 11px;
      color: var(--pass);
      min-width: 90px;
      font-family: var(--mono);
    }

    .header-spacer { flex: 1; }

    .tab-nav {
      display: flex;
      align-items: stretch;
      height: 100%;
      gap: 0;
    }

    .tab-nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text3);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 0 18px;
      cursor: pointer;
      transition: color 120ms ease, border-color 120ms ease;
      white-space: nowrap;
    }
    .tab-nav button:hover { color: var(--text2); }
    .tab-nav button.active { color: var(--text); border-bottom-color: var(--accent); }

    /* ─── APP BODY ───────────────────────────────────────────── */
    .app-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ─── TAB PANELS ─────────────────────────────────────────── */
    .tab-panel {
      position: absolute;
      inset: 0;
      bottom: 44px;
      display: flex;
    }
    .tab-panel.hidden { display: none !important; }
    .hidden { display: none !important; }

    /* ─── SIDEBAR ────────────────────────────────────────────── */
    #sidebar {
      width: 216px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text4);
      text-transform: uppercase;
      padding: 0 20px 10px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      color: var(--text3);
      font-size: 12.5px;
    }
    .sidebar-item:hover { background: var(--surface); color: var(--text2); }
    .sidebar-item.active {
      background: var(--accent-dim);
      border-left-color: var(--accent);
      color: var(--text);
    }

    .sbi-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 120ms ease;
    }
    .dot-pass { background: var(--pass); }
    .dot-fail { background: var(--fail); }
    .dot-neutral { background: var(--border2); }

    .sbi-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* ─── MAIN CONTENT ───────────────────────────────────────── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 40px 48px;
      min-width: 0;
    }

    .eval-header { margin-bottom: 32px; }

    #eval-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }

    #eval-prompt {
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.7;
      max-width: 700px;
    }
    #eval-prompt p { margin-bottom: 8px; }
    #eval-prompt p:last-child { margin-bottom: 0; }
    #eval-prompt code { font-family: var(--mono); font-size: 12px; color: var(--accent); background: var(--accent-dim); padding: 2px 6px; border-radius: 3px; }
    #eval-prompt pre { background: var(--surface); padding: 12px 16px; border-radius: 4px; overflow-x: auto; }

    /* ─── COMPARE GRID ───────────────────────────────────────── */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
    }

    .col-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
      animation: colFadeIn 300ms ease both;
    }
    .col-wrap:nth-child(2) { animation-delay: 60ms; }

    @keyframes colFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .col-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .col-header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .with-header .col-header-dot  { background: var(--with); box-shadow: 0 0 8px rgba(91,137,255,0.4); }
    .without-header .col-header-dot { background: var(--without); box-shadow: 0 0 8px rgba(255,122,122,0.4); }

    .col-header-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .with-header .col-header-label  { color: var(--with); }
    .without-header .col-header-label { color: var(--without); }

    /* ─── COLUMN BODY ────────────────────────────────────────── */
    #col-with, #col-without {
      display: flex;
      flex-direction: column;
      gap: 28px;
      min-width: 0;
    }

    /* ─── METRICS ────────────────────────────────────────────── */
    .run-metrics {
      display: flex;
      align-items: baseline;
      gap: 20px;
      flex-wrap: wrap;
    }

    .met-tokens {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .met-time {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text3);
    }

    .met-pass {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }
    .pass-100 { background: var(--pass-dim); color: var(--pass); }
    .pass-mid { background: rgba(245,200,66,0.1); color: var(--warn); }
    .pass-low { background: var(--fail-dim); color: var(--fail); }

    /* ─── ASSERTIONS ─────────────────────────────────────────── */
    .assertions-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .assertion {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 12px;
      border-radius: 5px;
      transition: background 100ms ease;
      animation: assertFadeIn 250ms ease both;
    }
    .assertion:hover { background: var(--surface); }

    @keyframes assertFadeIn {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .a-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .a-pass .a-icon { background: var(--pass-dim); color: var(--pass); }
    .a-fail .a-icon { background: var(--fail-dim); color: var(--fail); }

    .a-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .a-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .a-pass .a-text { color: var(--text); }
    .a-evidence { font-size: 11px; color: var(--text3); font-style: italic; }

    /* ─── OUTPUTS BUTTONS ────────────────────────────────────── */
    .outputs-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .output-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text3);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
      letter-spacing: 0.02em;
    }
    .output-btn:hover { color: var(--text); border-color: var(--text3); background: var(--surface); }

    /* ─── SECTION BLOCKS ─────────────────────────────────────── */
    .section-block { display: flex; flex-direction: column; gap: 10px; }

    .section-hdr {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text4);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
      transition: color 120ms ease;
    }
    .section-hdr:hover { color: var(--text3); }
    .section-hdr .arrow { font-size: 9px; transition: transform 150ms ease; }
    .collapsible { display: none; }
    .collapsible.open { display: block; }

    .transcript-md {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.7;
      max-height: 280px;
      overflow-y: auto;
      padding: 2px 0;
    }
    .transcript-md p { margin-bottom: 8px; }
    .transcript-md p:last-child { margin-bottom: 0; }
    .transcript-md pre { background: var(--surface); padding: 10px 14px; border-radius: 4px; overflow-x: auto; font-size: 11px; }
    .transcript-md code { font-family: var(--mono); font-size: 11px; color: var(--accent); }
    .transcript-md h1,.transcript-md h2,.transcript-md h3 { font-size: 13px; font-weight: 500; color: var(--text2); margin: 10px 0 4px; }

    /* ─── FEEDBACK ───────────────────────────────────────────── */
    .feedback-area {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.7;
      padding: 8px 0;
      resize: none;
      min-height: 64px;
      outline: none;
      transition: border-color 150ms ease;
    }
    .feedback-area::placeholder { color: var(--text4); }
    .feedback-area:focus { border-bottom-color: var(--border2); }

    /* ─── EMPTY STATE ────────────────────────────────────────── */
    .empty-state {
      font-size: 13px;
      color: var(--text4);
      padding: 20px 0;
      font-style: italic;
    }

    /* ─── NAV BAR ────────────────────────────────────────────── */
    #nav-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      z-index: 20;
    }
    #nav-bar.hidden { display: none !important; }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 5px;
      transition: color 120ms ease, background 120ms ease;
    }
    .nav-btn:hover:not(:disabled) { color: var(--text); background: var(--surface); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    #nav-counter {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text4);
      min-width: 52px;
      text-align: center;
    }

    .nav-sep { width: 1px; height: 16px; background: var(--border); }

    .nav-submit {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 16px;
      border-radius: 5px;
      transition: opacity 120ms ease;
    }
    .nav-submit:hover { opacity: 0.85; }

    .nav-hints {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text4);
    }

    /* ─── BENCHMARK ──────────────────────────────────────────── */
    #tab-benchmark {
      overflow-y: auto;
      padding: 48px 64px;
      display: block !important;
      bottom: 0 !important;
    }

    #benchmark-content {
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .bk-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text4);
      letter-spacing: 0.02em;
    }

    .kpi-grid { display: flex; gap: 16px; flex-wrap: wrap; }

    .kpi-card {
      flex: 1;
      min-width: 180px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
      transition: border-color 120ms ease;
    }
    .kpi-card:hover { border-color: var(--border2); }

    .kpi-cfg {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text4);
    }

    .kpi-tokens {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .kpi-stats {
      display: flex;
      gap: 14px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .kpi-pass { color: var(--pass); }
    .kpi-time { color: var(--text3); }

    .kpi-rating {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .chart-wrap {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      height: 200px;
      position: relative;
      background: var(--surface);
    }

    .bk-section { display: flex; flex-direction: column; gap: 16px; }

    .bk-title {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text4);
    }

    .bk-table { width: 100%; border-collapse: collapse; font-size: 13px; }

    .bk-table th {
      text-align: left;
      padding: 8px 16px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text4);
      border-bottom: 1px solid var(--border);
    }

    .bk-table td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .bk-table tr:last-child td { border-bottom: none; }
    .bk-table tr:hover td { background: var(--surface); }

    .bk-label { color: var(--text3) !important; font-size: 12px; }
    .bk-std { color: var(--text4); font-family: var(--mono); font-size: 11px; }

    .delta-neg { color: var(--pass); font-family: var(--mono); }
    .delta-pos { color: var(--fail); font-family: var(--mono); }

    .rating-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 3px;
    }
    .rating-excellent,.rating-efficace { background: var(--pass-dim); color: var(--pass); }
    .rating-neutre,.rating-moderate { background: rgba(245,200,66,0.1); color: var(--warn); }
    .rating-couteux,.rating-poor { background: var(--fail-dim); color: var(--fail); }

    .notes-list {
      margin: 0; padding: 0 0 0 0;
      list-style: none;
      display: flex; flex-direction: column; gap: 8px;
    }
    .notes-list li {
      font-size: 13px; color: var(--text3); line-height: 1.6;
      padding-left: 16px; position: relative;
    }
    .notes-list li::before { content: '—'; position: absolute; left: 0; color: var(--text4); }

    /* ─── MODAL ──────────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 40px;
      backdrop-filter: blur(4px);
    }
    .modal.hidden { display: none !important; }

    .modal-inner {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      width: 100%;
      max-width: 860px;
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: modalIn 180ms ease both;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #modal-title {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.02em;
    }

    .modal-close {
      background: none; border: none;
      color: var(--text3); font-size: 16px;
      cursor: pointer; padding: 4px;
      line-height: 1; transition: color 120ms ease;
      border-radius: 3px;
    }
    .modal-close:hover { color: var(--text); background: var(--surface2); }

    #modal-body {
      overflow-y: auto; flex: 1; padding: 24px;
    }

    .code-block {
      font-family: var(--mono); font-size: 12px;
      color: var(--text3); line-height: 1.7;
      white-space: pre-wrap; word-break: break-all; margin: 0;
    }

    .md-render { font-size: 14px; color: var(--text); line-height: 1.75; }
    .md-render p { margin-bottom: 10px; }
    .md-render p:last-child { margin-bottom: 0; }
    .md-render pre { background: var(--surface2); padding: 14px 16px; border-radius: 4px; overflow-x: auto; margin: 10px 0; }
    .md-render code { font-family: var(--mono); font-size: 12px; color: var(--accent); }
    .md-render pre code { color: var(--text2); }
    .md-render h1 { font-size: 18px; font-weight: 500; margin: 20px 0 8px; letter-spacing: -0.02em; }
    .md-render h2 { font-size: 15px; font-weight: 500; margin: 16px 0 6px; }
    .md-render h3 { font-size: 13px; font-weight: 500; margin: 12px 0 4px; color: var(--text2); }
    .md-render ul,.md-render ol { padding-left: 20px; margin: 8px 0; }
    .md-render li { margin: 4px 0; }
    .md-render blockquote { border-left: 2px solid var(--border2); padding-left: 14px; margin: 10px 0; color: var(--text3); }
    .md-render a { color: var(--accent); text-decoration: none; }
    .md-render a:hover { text-decoration: underline; }
    .md-render table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0; }
    .md-render th { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text3); font-weight: 500; text-align: left; }
    .md-render td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body>

  <header class="app-header">
    <span class="header-skill">__SKILL_NAME_PLACEHOLDER__</span>
    <div class="header-sep"></div>
    <span id="save-status"></span>
    <div class="header-spacer"></div>
    <nav class="tab-nav">
      <button data-tab="outputs" onclick="switchTab('outputs')" class="active">Outputs</button>
      <button data-tab="benchmark" onclick="switchTab('benchmark')">Benchmark</button>
    </nav>
  </header>

  <div class="app-body">

    <div id="tab-outputs" class="tab-panel outputs-panel">

      <aside id="sidebar">
        <div class="sidebar-label">Evaluations</div>
      </aside>

      <div id="main-content">
        <div class="eval-header">
          <div id="eval-name"></div>
          <div id="eval-prompt"></div>
        </div>
        <div class="compare-grid">
          <div class="col-wrap">
            <div class="col-header with-header">
              <div class="col-header-dot"></div>
              <span class="col-header-label">with skill</span>
            </div>
            <div id="col-with"></div>
          </div>
          <div class="col-wrap">
            <div class="col-header without-header">
              <div class="col-header-dot"></div>
              <span class="col-header-label">without skill</span>
            </div>
            <div id="col-without"></div>
          </div>
        </div>
      </div>

    </div>

    <div id="tab-benchmark" class="tab-panel hidden">
      <div id="benchmark-content"></div>
    </div>

    <nav id="nav-bar">
      <button id="btn-prev" class="nav-btn" onclick="navigate(-1)">← Précédent</button>
      <span id="nav-counter"></span>
      <button id="btn-next" class="nav-btn" onclick="navigate(1)">Suivant →</button>
      <div class="nav-sep"></div>
      <button class="nav-submit" onclick="submitReviews()">Soumettre</button>
      <div class="nav-sep"></div>
      <span class="nav-hints">j/k ← → · b · Échap</span>
    </nav>

  </div>

  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;
    const BENCHMARK_DATA = __BENCHMARK_DATA_PLACEHOLDER__;
    const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
    const PREVIOUS_DATA = __PREVIOUS_DATA_PLACEHOLDER__;

    function esc(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function safeId(str) { return String(str).replace(/[^a-zA-Z0-9_-]/g,'_'); }
    function renderMd(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined') return marked.parse(text);
      return '<pre style="white-space:pre-wrap">' + esc(text) + '</pre>';
    }

    const runOutputsMap = {};
    EVAL_DATA.forEach(r => { runOutputsMap[r.run_id] = r.outputs_content || {}; });

    let modalIsOpen = false;
    function openModal(filename, runId) {
      const content = runOutputsMap[runId]?.[filename] || '(contenu non disponible)';
      document.getElementById('modal-title').textContent = filename;
      const body = document.getElementById('modal-body');
      if (filename.endsWith('.md')) {
        body.innerHTML = '<div class="md-render">' + renderMd(content) + '</div>';
      } else if (filename.endsWith('.json')) {
        try { body.innerHTML = '<pre class="code-block">' + esc(JSON.stringify(JSON.parse(content),null,2)) + '</pre>'; }
        catch { body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>'; }
      } else {
        body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>';
      }
      document.getElementById('modal').classList.remove('hidden');
      modalIsOpen = true;
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); modalIsOpen = false; }
    function handleModalClick(e) { if (e.target.id === 'modal') closeModal(); }

    function buildEvalGroups(data) {
      const map = new Map();
      data.forEach(run => {
        if (!map.has(run.eval_name)) map.set(run.eval_name, { name: run.eval_name, prompt: run.prompt, configs: {} });
        map.get(run.eval_name).configs[run.configuration] = run;
      });
      return Array.from(map.values());
    }
    const evalGroups = buildEvalGroups(EVAL_DATA);
    let currentEvalIndex = 0;
    const feedback = {};
    EVAL_DATA.forEach(r => { feedback[r.run_id] = ''; });

    function renderRunColumn(colId, run) {
      const col = document.getElementById(colId);
      if (!col) return;
      if (!run) { col.innerHTML = '<p class="empty-state">Non disponible</p>'; return; }
      const exp = run.grading?.expectations || [];
      const passCount = exp.filter(e => e.passed).length;
      const passRate = exp.length ? Math.round(passCount / exp.length * 100) : null;
      const tokens = (run.timing?.total_tokens || 0).toLocaleString('fr-FR');
      const secs = run.timing?.total_duration_seconds;
      const passClass = passRate === 100 ? 'pass-100' : (passRate !== null && passRate >= 60) ? 'pass-mid' : 'pass-low';

      let html = `<div class="run-metrics">
        <span class="met-tokens">${tokens}</span>
        ${secs ? `<span class="met-time">${secs}s</span>` : ''}
        ${passRate !== null ? `<span class="met-pass ${passClass}">${passRate}%</span>` : ''}
      </div>`;

      if (exp.length) {
        html += `<div class="assertions-list">`;
        exp.forEach((e, i) => {
          html += `<div class="assertion ${e.passed ? 'a-pass' : 'a-fail'}" style="animation-delay:${i*40}ms">
            <span class="a-icon">${e.passed ? '✓' : '✗'}</span>
            <div class="a-body">
              <div class="a-text">${esc(e.text)}</div>
              ${e.evidence ? `<div class="a-evidence">${esc(e.evidence)}</div>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      if (run.outputs_list?.length) {
        html += `<div class="outputs-row">`;
        run.outputs_list.forEach(f => {
          html += `<button class="output-btn" onclick="openModal('${esc(f)}','${esc(run.run_id)}')">${esc(f)} ↗</button>`;
        });
        html += `</div>`;
      }

      const tid = 'tr-' + safeId(run.run_id);
      html += `<div class="section-block">
        <div class="section-hdr collapsible-toggle" onclick="toggleSection('${tid}')">
          Transcript <span class="arrow">▾</span>
        </div>
        <div class="collapsible" id="${tid}">
          <div class="transcript-md">${renderMd(run.transcript || '(vide)')}</div>
        </div>
      </div>`;

      html += `<div class="section-block">
        <div class="section-hdr">Feedback</div>
        <textarea class="feedback-area" placeholder="Notes sur ce run…"
          oninput="saveFeedback('${run.run_id}',this.value)">${esc(feedback[run.run_id] || '')}</textarea>
      </div>`;

      col.innerHTML = html;
    }

    function toggleSection(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }

    function renderCurrentEval() {
      const g = evalGroups[currentEvalIndex];
      if (!g) return;
      const nameEl = document.getElementById('eval-name'); if (nameEl) nameEl.textContent = g.name;
      const promptEl = document.getElementById('eval-prompt'); if (promptEl) promptEl.innerHTML = renderMd(g.prompt || '');
      renderRunColumn('col-with', g.configs['with_skill']);
      renderRunColumn('col-without', g.configs['without_skill']);
    }

    function goToEval(index) {
      if (index < 0 || index >= evalGroups.length) return;
      currentEvalIndex = index;
      renderCurrentEval(); updateSidebar(); updateNavBar();
      const mc = document.getElementById('main-content'); if (mc) mc.scrollTop = 0;
    }
    function navigate(dir) { goToEval(currentEvalIndex + dir); }
    function updateNavBar() {
      const ctr = document.getElementById('nav-counter'); if (ctr) ctr.textContent = `${currentEvalIndex+1} / ${evalGroups.length}`;
      const p = document.getElementById('btn-prev'); const n = document.getElementById('btn-next');
      if (p) p.disabled = currentEvalIndex === 0; if (n) n.disabled = currentEvalIndex === evalGroups.length-1;
    }

    function buildSidebar() {
      const sb = document.getElementById('sidebar'); if (!sb) return;
      const label = sb.querySelector('.sidebar-label');
      const items = evalGroups.map((g,i) => {
        const cfgs = Object.keys(g.configs);
        const allPass = cfgs.every(c => { const e=g.configs[c]?.grading?.expectations||[]; return e.length>0&&e.every(x=>x.passed); });
        const anyFail = cfgs.some(c => (g.configs[c]?.grading?.expectations||[]).some(x=>!x.passed));
        const dotClass = allPass ? 'dot-pass' : anyFail ? 'dot-fail' : 'dot-neutral';
        return `<div class="sidebar-item ${i===0?'active':''}" id="sbi-${i}" onclick="goToEval(${i})">
          <span class="sbi-dot ${dotClass}"></span>
          <span class="sbi-name">${esc(g.name)}</span>
        </div>`;
      }).join('');
      sb.innerHTML = '';
      if (label) sb.appendChild(label);
      sb.insertAdjacentHTML('beforeend', items);
    }
    function updateSidebar() {
      evalGroups.forEach((_,i) => { const el=document.getElementById(`sbi-${i}`); if(el) el.classList.toggle('active', i===currentEvalIndex); });
    }

    function switchTab(name) {
      ['outputs','benchmark'].forEach(t => {
        const p=document.getElementById(`tab-${t}`); if(p) p.classList.toggle('hidden', t!==name);
        const b=document.querySelector(`[data-tab="${t}"]`); if(b) b.classList.toggle('active', t===name);
      });
      const nb=document.getElementById('nav-bar'); if(nb) nb.classList.toggle('hidden', name!=='outputs');
      if(name==='benchmark') renderBenchmark();
    }

    function saveFeedback(runId, value) { feedback[runId] = value; showStatus('saved'); }
    function showStatus(msg) {
      const el=document.getElementById('save-status'); if(!el) return;
      el.textContent = msg; setTimeout(()=>{ el.textContent=''; }, 1500);
    }
    function submitReviews() {
      const reviews = EVAL_DATA.map(run => ({ run_id: run.run_id, feedback: feedback[run.run_id]||'', timestamp: new Date().toISOString() }));
      const blob = new Blob([JSON.stringify({reviews, status:'complete'},null,2)], {type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='feedback.json'; a.click();
      showStatus('exported');
    }

    let chartsInit = false;
    function renderBenchmark() {
      const bk = BENCHMARK_DATA;
      const el = document.getElementById('benchmark-content');
      if (!bk?.run_summary) { if(el) el.innerHTML='<p class="empty-state">Benchmark non disponible.</p>'; return; }
      const summary = bk.run_summary;
      const configs = Object.keys(summary).filter(k => k !== 'delta');
      const efficiency = bk.token_efficiency || {};
      const notes = bk.analyst_notes || [];
      const meta = bk.metadata || {};

      let html = `<div class="bk-meta">${esc(meta.skill_name||SKILL_NAME)} · ${esc(meta.executor_model||'—')} · ${esc(meta.timestamp||'—')} · ${(meta.evals_run||[]).length} evals</div>`;

      html += '<div class="kpi-grid">';
      configs.forEach(cfg => {
        const s=summary[cfg]||{};
        const tokens=Math.round(s.tokens?.mean||0).toLocaleString('fr-FR');
        const pr=Math.round((s.pass_rate?.mean||0)*100);
        const time=(s.time_seconds?.mean||0).toFixed(1);
        const eff=efficiency[cfg];
        html+=`<div class="kpi-card"><div class="kpi-cfg">${esc(cfg.replace(/_/g,' '))}</div><div class="kpi-tokens">${tokens}</div><div class="kpi-stats"><span class="kpi-pass">${pr}%</span><span class="kpi-time">${time}s</span></div>${eff?`<div class="kpi-rating rating-${esc(eff.rating)}">${esc(eff.rating)}</div>`:''}</div>`;
      });
      html += '</div>';

      html += `<div class="charts-row"><div class="chart-wrap"><canvas id="chart-tokens"></canvas></div><div class="chart-wrap"><canvas id="chart-pass"></canvas></div></div>`;

      html += `<div class="bk-section"><div class="bk-title">Comparaison</div><table class="bk-table"><thead><tr><th>Métrique</th>${configs.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('')}</tr></thead><tbody>`;
      [{label:'Tokens',key:'tokens',fmt:v=>Math.round(v).toLocaleString('fr-FR')},{label:'Pass rate',key:'pass_rate',fmt:v=>`${Math.round(v*100)}%`},{label:'Temps (s)',key:'time_seconds',fmt:v=>v.toFixed(1)}].forEach(row=>{
        html+=`<tr><td class="bk-label">${row.label}</td>${configs.map(cfg=>{const s=summary[cfg]?.[row.key]||{};return`<td>${row.fmt(s.mean||0)} <span class="bk-std">±${row.fmt(s.stddev||0)}</span></td>`;}).join('')}</tr>`;
      });
      const delta=summary.delta||{};
      const fd=Object.values(delta)[0];
      if(fd){html+=`<tr><td class="bk-label">Δ tokens</td><td colspan="${configs.length}"><span class="${fd.tokens?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(fd.tokens||'—')}</span> ${fd.rating?`<span class="rating-badge rating-${esc(fd.rating)}">${esc(fd.rating)}</span>`:''}</td></tr>`;}
      html += '</tbody></table></div>';

      if(Object.keys(efficiency).length){
        html+=`<div class="bk-section"><div class="bk-title">Token Efficiency</div><table class="bk-table"><thead><tr><th>Config</th><th>Réf.</th><th>Δ Tokens</th><th>Δ Pass Rate</th><th>Tok/pt</th><th>Rating</th></tr></thead><tbody>`;
        Object.entries(efficiency).forEach(([cfg,eff])=>{
          html+=`<tr><td>${esc(cfg)}</td><td class="bk-label">${esc(eff.vs)}</td><td class="${eff.tokens_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.tokens_delta)}</td><td class="${eff.pass_rate_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.pass_rate_delta)}</td><td>${eff.tokens_per_pass_rate_point?.toLocaleString('fr-FR')||'—'}</td><td class="rating-badge rating-${esc(eff.rating)}">${esc(eff.rating)}</td></tr>`;
        });
        html+='</tbody></table></div>';
      }

      if(notes.length){html+=`<div class="bk-section"><div class="bk-title">Observations</div><ul class="notes-list">${notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;}

      if(el) el.innerHTML = html;

      if(!chartsInit && typeof Chart !== 'undefined'){
        chartsInit = true;
        const labels=configs.map(c=>c.replace(/_/g,' '));
        const colors=['rgba(124,106,247,0.75)','rgba(255,122,122,0.75)','rgba(78,216,122,0.75)','rgba(245,200,66,0.75)'];
        const borders=['#7C6AF7','#FF7A7A','#4ED87A','#F5C842'];
        const opts=(title)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:title,color:'#EDEDED',font:{size:11,family:'DM Mono, monospace',weight:'400'}}},scales:{x:{ticks:{color:'#555',font:{family:'DM Mono, monospace',size:10}},grid:{color:'#1E1E1E'}},y:{ticks:{color:'#555',font:{family:'DM Mono, monospace',size:10}},grid:{color:'#1E1E1E'}}}});
        new Chart(document.getElementById('chart-tokens'),{type:'bar',data:{labels,datasets:[{label:'Tokens',data:configs.map(c=>Math.round(summary[c]?.tokens?.mean||0)),backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:3}]},options:opts('tokens moyens')});
        new Chart(document.getElementById('chart-pass'),{type:'bar',data:{labels,datasets:[{label:'Pass Rate (%)',data:configs.map(c=>Math.round((summary[c]?.pass_rate?.mean||0)*100)),backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:3}]},options:opts('pass rate %')});
      }
    }

    document.addEventListener('keydown', e => {
      if(modalIsOpen){ if(e.key==='Escape') closeModal(); return; }
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(e.key==='ArrowLeft'||e.key==='k') navigate(-1);
      if(e.key==='ArrowRight'||e.key==='j') navigate(1);
      if(e.key==='b'){ const bk=document.getElementById('tab-benchmark'); switchTab(bk?.classList.contains('hidden')?'benchmark':'outputs'); }
      if(e.key==='Escape') switchTab('outputs');
    });

    buildSidebar();
    renderCurrentEval();
    updateNavBar();
  </script>

</body>
</html>
