<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__SKILL_NAME_PLACEHOLDER__ — Review</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #222222;
      --border2: #1a1a1a;
      --text: #f7f7f7;
      --muted: #666666;
      --muted2: #444444;
      --accent: #5b6ad0;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #c4b5fd;
      --yellow: #fbbf24;
      --with-color: #5b6ad0;
      --without-color: #c77b7b;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      font-size: 14px;
      letter-spacing: -0.01em;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 48px;
      border-bottom: 1px solid var(--border2);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-skill-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .header-dot {
      color: var(--muted2);
      font-size: 12px;
    }

    #save-status {
      font-size: 11px;
      color: var(--muted);
      min-width: 80px;
    }

    .header-spacer { flex: 1; }

    .tab-list {
      display: flex;
      gap: 0;
      align-items: stretch;
      height: 100%;
    }

    .tab-list button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: inherit;
      letter-spacing: -0.01em;
      cursor: pointer;
      padding: 0 16px;
      height: 100%;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-list button:hover { color: var(--text); }

    .tab-list button.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* ── App body ────────────────────────────────────────────────── */
    .app-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── Tab panels ──────────────────────────────────────────────── */
    .tab-panel {
      position: absolute;
      inset: 0;
      bottom: 48px; /* nav-bar height */
      display: flex;
    }

    .tab-panel.hidden { display: none !important; }

    /* ── Outputs panel ───────────────────────────────────────────── */
    .outputs-panel {
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border2);
      overflow-y: auto;
      padding: 16px 0;
    }

    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 20px;
      cursor: pointer;
      transition: color 0.1s;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .sidebar-item:hover { color: var(--text); }

    .sidebar-item.active { color: var(--text); }

    .sidebar-item.active .sbi-name {
      color: var(--text);
    }

    .sbi-dot {
      font-size: 8px;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    .dot-pass { color: var(--green); }
    .dot-fail { color: var(--red); }
    .dot-neutral { color: var(--muted2); }

    .sidebar-item.active .sbi-dot.dot-neutral { color: var(--accent); }

    .sbi-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Main content ────────────────────────────────────────────── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 0;
    }

    #main-content::-webkit-scrollbar { width: 4px; }
    #main-content::-webkit-scrollbar-track { background: transparent; }
    #main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .eval-header { display: flex; flex-direction: column; gap: 12px; }

    #eval-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    #eval-prompt {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    #eval-prompt p { margin: 0 0 8px; }
    #eval-prompt p:last-child { margin-bottom: 0; }
    #eval-prompt pre { background: var(--surface2); padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    #eval-prompt code { font-size: 12px; color: var(--purple); }

    .eval-divider {
      height: 1px;
      background: var(--border2);
    }

    /* ── Compare grid ────────────────────────────────────────────── */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--border2);
      border-radius: 6px;
      overflow: hidden;
    }

    .col-wrap {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .col-wrap + .col-wrap {
      border-left: 1px solid var(--border);
    }

    .col-header {
      padding: 12px 20px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border2);
      background: var(--surface);
    }

    .col-header.with-header { color: var(--with-color); }
    .col-header.without-header { color: var(--without-color); }

    #col-with,
    #col-without {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }

    /* ── Run metrics ─────────────────────────────────────────────── */
    .run-metrics {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .met {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0;
    }

    .met-tokens::before { content: ''; }
    .met-time::before { content: ''; }

    .met-pass { font-weight: 500; }
    .pass-100 { color: var(--green); }
    .pass-mid { color: var(--yellow); }
    .pass-low { color: var(--red); }

    /* ── Assertions ──────────────────────────────────────────────── */
    .assertions-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .assertion {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .a-icon {
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 1px;
      font-weight: 600;
    }

    .a-pass .a-icon { color: var(--green); }
    .a-fail .a-icon { color: var(--red); }

    .a-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }

    .a-text { color: var(--text); }

    .a-evidence {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Outputs row ─────────────────────────────────────────────── */
    .outputs-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .output-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-family: inherit;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0;
    }

    .output-btn:hover {
      color: var(--text);
      border-color: var(--muted2);
    }

    /* ── Section blocks ──────────────────────────────────────────── */
    .section-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-hdr {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-hdr .arrow {
      font-size: 10px;
      color: var(--muted2);
      transition: transform 0.15s;
    }

    /* ── Transcript ──────────────────────────────────────────────── */
    .collapsible { display: none; }
    .collapsible.open { display: block; }

    .transcript-md {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
    }

    .transcript-md::-webkit-scrollbar { width: 3px; }
    .transcript-md::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .transcript-md p { margin: 0 0 8px; }
    .transcript-md p:last-child { margin-bottom: 0; }
    .transcript-md pre { background: var(--surface2); padding: 10px; border-radius: 3px; overflow-x: auto; font-size: 11px; white-space: pre-wrap; }
    .transcript-md code { font-size: 11px; color: var(--purple); }
    .transcript-md h1,.transcript-md h2,.transcript-md h3 { font-size: 13px; font-weight: 500; margin: 12px 0 4px; color: var(--text); }

    /* ── Feedback ────────────────────────────────────────────────── */
    .feedback-area {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.6;
      padding: 10px 12px;
      resize: vertical;
      min-height: 72px;
      width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }

    .feedback-area::placeholder { color: var(--muted2); }

    .feedback-area:focus { border-color: var(--border); }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      font-size: 13px;
      color: var(--muted2);
      margin: 0;
      padding: 8px 0;
    }

    /* ── Nav bar ─────────────────────────────────────────────────── */
    #nav-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      border-top: 1px solid var(--border2);
      background: var(--surface);
      z-index: 10;
    }

    #nav-bar.hidden { display: none !important; }

    .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 4px;
      transition: color 0.15s;
      letter-spacing: -0.01em;
    }

    .nav-btn:hover:not(:disabled) { color: var(--text); }

    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #nav-counter {
      font-size: 12px;
      color: var(--muted2);
      min-width: 60px;
      text-align: center;
    }

    .nav-submit {
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      padding: 6px 16px;
      border-radius: 4px;
      transition: opacity 0.15s;
    }

    .nav-submit:hover { opacity: 0.85; }

    .nav-hints {
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0;
    }

    .nav-sep {
      width: 1px;
      height: 16px;
      background: var(--border2);
    }

    /* ── Benchmark ───────────────────────────────────────────────── */
    #tab-benchmark {
      overflow-y: auto;
      padding: 40px;
      display: block;
      bottom: 0;
    }

    #tab-benchmark::-webkit-scrollbar { width: 4px; }
    #tab-benchmark::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #benchmark-content {
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .bk-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0;
    }

    .kpi-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 20px 24px;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .kpi-cfg {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .kpi-tokens {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .kpi-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
    }

    .kpi-pass { color: var(--green); }
    .kpi-time { color: var(--muted); }

    .kpi-rating {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 20px;
      height: 220px;
      position: relative;
    }

    .bk-section { display: flex; flex-direction: column; gap: 16px; }

    .bk-title {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .bk-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .bk-table th {
      text-align: left;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 1px solid var(--border2);
      letter-spacing: 0.02em;
    }

    .bk-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border2);
      color: var(--text);
      vertical-align: middle;
    }

    .bk-table tr:last-child td { border-bottom: none; }

    .bk-label { color: var(--muted); font-size: 12px; }

    .bk-std { color: var(--muted2); font-size: 11px; }

    .delta-neg { color: var(--green); }
    .delta-pos { color: var(--red); }

    .rating-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .rating-excellent, .rating-good { color: var(--green); }
    .rating-neutral, .rating-moderate { color: var(--yellow); }
    .rating-poor, .rating-bad { color: var(--red); }

    .notes-list {
      margin: 0;
      padding: 0 0 0 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .notes-list li {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Modal ───────────────────────────────────────────────────── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 32px;
    }

    .modal.hidden { display: none !important; }

    .modal-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px;
      max-width: 800px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #modal-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
    }

    .modal-close:hover { color: var(--text); }

    #modal-body {
      overflow-y: auto;
      flex: 1;
    }

    #modal-body::-webkit-scrollbar { width: 4px; }
    #modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .code-block {
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    .md-render {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
    }

    .md-render p { margin: 0 0 10px; }
    .md-render p:last-child { margin-bottom: 0; }
    .md-render pre { background: var(--surface2); padding: 12px; border-radius: 4px; overflow-x: auto; }
    .md-render code { font-size: 12px; color: var(--purple); font-family: 'SF Mono', monospace; }
    .md-render h1,.md-render h2,.md-render h3 { margin: 16px 0 8px; font-weight: 500; letter-spacing: -0.02em; }
    .md-render h1 { font-size: 16px; }
    .md-render h2 { font-size: 14px; }
    .md-render h3 { font-size: 13px; }
    .md-render ul,.md-render ol { padding-left: 20px; margin: 8px 0; }
    .md-render li { margin: 4px 0; }
    .md-render blockquote { border-left: 2px solid var(--border); padding-left: 12px; margin: 8px 0; color: var(--muted); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="app-header">
    <span class="header-skill-name">__SKILL_NAME_PLACEHOLDER__</span>
    <span class="header-dot">·</span>
    <span id="save-status"></span>
    <div class="header-spacer"></div>
    <nav class="tab-list">
      <button data-tab="outputs" onclick="switchTab('outputs')" class="active">Outputs</button>
      <button data-tab="benchmark" onclick="switchTab('benchmark')">Benchmark</button>
    </nav>
  </header>

  <!-- ── App body ───────────────────────────────────────────────── -->
  <div class="app-body">

    <!-- ── Outputs panel ──────────────────────────────────────────── -->
    <div id="tab-outputs" class="tab-panel outputs-panel">

      <!-- Sidebar -->
      <aside id="sidebar"></aside>

      <!-- Main content -->
      <div id="main-content">
        <div class="eval-header">
          <div id="eval-name"></div>
          <div id="eval-prompt"></div>
        </div>
        <div class="eval-divider"></div>
        <div class="compare-grid">
          <div class="col-wrap">
            <div class="col-header with-header">with skill</div>
            <div id="col-with"></div>
          </div>
          <div class="col-wrap">
            <div class="col-header without-header">without skill</div>
            <div id="col-without"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- ── Benchmark panel ────────────────────────────────────────── -->
    <div id="tab-benchmark" class="tab-panel hidden">
      <div id="benchmark-content"></div>
    </div>

    <!-- ── Nav bar ────────────────────────────────────────────────── -->
    <nav id="nav-bar" class="nav-bar">
      <button id="btn-prev" class="nav-btn" onclick="navigate(-1)">← Précédent</button>
      <span id="nav-counter"></span>
      <button id="btn-next" class="nav-btn" onclick="navigate(1)">Suivant →</button>
      <div class="nav-sep"></div>
      <button class="nav-submit" onclick="submitReviews()">Soumettre</button>
      <div class="nav-sep"></div>
      <span class="nav-hints">j/k ← → : naviguer · b : benchmark · Échap : fermer</span>
    </nav>

  </div>

  <!-- ── Modal ──────────────────────────────────────────────────── -->
  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;
    const BENCHMARK_DATA = __BENCHMARK_DATA_PLACEHOLDER__;
    const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
    const PREVIOUS_DATA = __PREVIOUS_DATA_PLACEHOLDER__;

    function esc(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function safeId(str) { return String(str).replace(/[^a-zA-Z0-9_-]/g,'_'); }
    function renderMd(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined') return marked.parse(text);
      return '<pre style="white-space:pre-wrap">' + esc(text) + '</pre>';
    }

    const runOutputsMap = {};
    EVAL_DATA.forEach(r => { runOutputsMap[r.run_id] = r.outputs_content || {}; });

    let modalIsOpen = false;
    function openModal(filename, runId) {
      const content = runOutputsMap[runId]?.[filename] || '(contenu non disponible)';
      document.getElementById('modal-title').textContent = filename;
      const body = document.getElementById('modal-body');
      if (filename.endsWith('.md')) {
        body.innerHTML = '<div class="md-render">' + renderMd(content) + '</div>';
      } else if (filename.endsWith('.json')) {
        try { body.innerHTML = '<pre class="code-block">' + esc(JSON.stringify(JSON.parse(content),null,2)) + '</pre>'; }
        catch { body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>'; }
      } else {
        body.innerHTML = '<pre class="code-block">' + esc(content) + '</pre>';
      }
      document.getElementById('modal').classList.remove('hidden');
      modalIsOpen = true;
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); modalIsOpen = false; }
    function handleModalClick(e) { if (e.target.id === 'modal') closeModal(); }

    function buildEvalGroups(data) {
      const map = new Map();
      data.forEach(run => {
        if (!map.has(run.eval_name)) map.set(run.eval_name, { name: run.eval_name, prompt: run.prompt, configs: {} });
        map.get(run.eval_name).configs[run.configuration] = run;
      });
      return Array.from(map.values());
    }
    const evalGroups = buildEvalGroups(EVAL_DATA);
    let currentEvalIndex = 0;
    const feedback = {};
    EVAL_DATA.forEach(r => { feedback[r.run_id] = ''; });

    function renderRunColumn(colId, run) {
      const col = document.getElementById(colId);
      if (!col) return;
      if (!run) { col.innerHTML = '<p class="empty-state">Non disponible</p>'; return; }
      const exp = run.grading?.expectations || [];
      const passCount = exp.filter(e => e.passed).length;
      const passRate = exp.length ? Math.round(passCount / exp.length * 100) : null;
      const tokens = (run.timing?.total_tokens || 0).toLocaleString('fr-FR');
      const secs = run.timing?.total_duration_seconds;
      const passClass = passRate === 100 ? 'pass-100' : (passRate !== null && passRate >= 60) ? 'pass-mid' : 'pass-low';

      let html = `<div class="run-metrics">
        <span class="met met-tokens">${tokens} tok</span>
        ${secs ? `<span class="met met-time">${secs}s</span>` : ''}
        ${passRate !== null ? `<span class="met met-pass ${passClass}">${passRate}%</span>` : ''}
      </div>`;

      if (exp.length) {
        html += `<div class="assertions-list">`;
        exp.forEach(e => {
          html += `<div class="assertion ${e.passed ? 'a-pass' : 'a-fail'}">
            <span class="a-icon">${e.passed ? '✓' : '✗'}</span>
            <div class="a-body">
              <div class="a-text">${esc(e.text)}</div>
              ${e.evidence ? `<div class="a-evidence">${esc(e.evidence)}</div>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      if (run.outputs_list?.length) {
        html += `<div class="outputs-row">`;
        run.outputs_list.forEach(f => {
          html += `<button class="output-btn" onclick="openModal('${esc(f)}','${esc(run.run_id)}')">${esc(f)} ↗</button>`;
        });
        html += `</div>`;
      }

      const tid = 'tr-' + safeId(run.run_id);
      html += `<div class="section-block">
        <div class="section-hdr collapsible-toggle" onclick="toggleSection('${tid}')">
          Transcript <span class="arrow">▾</span>
        </div>
        <div class="collapsible open" id="${tid}">
          <div class="md-render transcript-md">${renderMd(run.transcript || '(vide)')}</div>
        </div>
      </div>`;

      html += `<div class="section-block">
        <div class="section-hdr">Feedback</div>
        <textarea class="feedback-area" placeholder="Notes sur ce run…"
          oninput="saveFeedback('${run.run_id}',this.value)">${esc(feedback[run.run_id] || '')}</textarea>
      </div>`;

      col.innerHTML = html;
    }

    function toggleSection(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }

    function renderCurrentEval() {
      const g = evalGroups[currentEvalIndex];
      if (!g) return;
      const nameEl = document.getElementById('eval-name'); if (nameEl) nameEl.textContent = g.name;
      const promptEl = document.getElementById('eval-prompt'); if (promptEl) promptEl.innerHTML = renderMd(g.prompt || '');
      renderRunColumn('col-with', g.configs['with_skill']);
      renderRunColumn('col-without', g.configs['without_skill']);
    }

    function goToEval(index) {
      if (index < 0 || index >= evalGroups.length) return;
      currentEvalIndex = index;
      renderCurrentEval(); updateSidebar(); updateNavBar();
      const mc = document.getElementById('main-content'); if (mc) mc.scrollTop = 0;
    }
    function navigate(dir) { goToEval(currentEvalIndex + dir); }
    function updateNavBar() {
      const ctr = document.getElementById('nav-counter'); if (ctr) ctr.textContent = `${currentEvalIndex+1} / ${evalGroups.length}`;
      const p = document.getElementById('btn-prev'); const n = document.getElementById('btn-next');
      if (p) p.disabled = currentEvalIndex === 0; if (n) n.disabled = currentEvalIndex === evalGroups.length-1;
    }

    function buildSidebar() {
      const sb = document.getElementById('sidebar'); if (!sb) return;
      sb.innerHTML = evalGroups.map((g,i) => {
        const cfgs = Object.keys(g.configs);
        const allPass = cfgs.every(c => { const e=g.configs[c]?.grading?.expectations||[]; return e.length>0&&e.every(x=>x.passed); });
        const anyFail = cfgs.some(c => (g.configs[c]?.grading?.expectations||[]).some(x=>!x.passed));
        const dot = allPass ? '●' : anyFail ? '●' : '○';
        const dotClass = allPass ? 'dot-pass' : anyFail ? 'dot-fail' : 'dot-neutral';
        return `<div class="sidebar-item ${i===0?'active':''}" id="sbi-${i}" onclick="goToEval(${i})">
          <span class="sbi-dot ${dotClass}">${dot}</span>
          <span class="sbi-name">${esc(g.name)}</span>
        </div>`;
      }).join('');
    }
    function updateSidebar() {
      evalGroups.forEach((_,i) => { const el=document.getElementById(`sbi-${i}`); if(el) el.classList.toggle('active', i===currentEvalIndex); });
    }

    function switchTab(name) {
      ['outputs','benchmark'].forEach(t => {
        const p=document.getElementById(`tab-${t}`); if(p) p.classList.toggle('hidden', t!==name);
        const b=document.querySelector(`[data-tab="${t}"]`); if(b) b.classList.toggle('active', t===name);
      });
      const nb=document.getElementById('nav-bar'); if(nb) nb.classList.toggle('hidden', name!=='outputs');
      if(name==='benchmark') renderBenchmark();
    }

    function saveFeedback(runId, value) { feedback[runId] = value; showStatus('Sauvegardé'); }
    function showStatus(msg) {
      const el=document.getElementById('save-status'); if(!el) return;
      el.textContent = msg; setTimeout(()=>{ el.textContent=''; }, 1500);
    }
    function submitReviews() {
      const reviews = EVAL_DATA.map(run => ({ run_id: run.run_id, feedback: feedback[run.run_id]||'', timestamp: new Date().toISOString() }));
      const blob = new Blob([JSON.stringify({reviews, status:'complete'},null,2)], {type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='feedback.json'; a.click();
      showStatus('feedback.json téléchargé ✓');
    }

    let chartsInit = false;
    function renderBenchmark() {
      const bk = BENCHMARK_DATA;
      const el = document.getElementById('benchmark-content');
      if (!bk?.run_summary) { if(el) el.innerHTML='<p class="empty-state">Benchmark non disponible.</p>'; return; }
      const summary = bk.run_summary;
      const configs = Object.keys(summary).filter(k => k !== 'delta');
      const efficiency = bk.token_efficiency || {};
      const notes = bk.analyst_notes || [];
      const meta = bk.metadata || {};

      let html = `<div class="bk-meta">${esc(meta.skill_name||SKILL_NAME)} · ${esc(meta.executor_model||'—')} · ${esc(meta.timestamp||'—')} · ${(meta.evals_run||[]).length} evals</div>`;

      html += '<div class="kpi-grid">';
      configs.forEach(cfg => {
        const s=summary[cfg]||{};
        const tokens=Math.round(s.tokens?.mean||0).toLocaleString('fr-FR');
        const pr=Math.round((s.pass_rate?.mean||0)*100);
        const time=(s.time_seconds?.mean||0).toFixed(1);
        const eff=efficiency[cfg];
        html+=`<div class="kpi-card"><div class="kpi-cfg">${esc(cfg.replace(/_/g,' '))}</div><div class="kpi-tokens">${tokens} tok</div><div class="kpi-stats"><span class="kpi-pass">${pr}%</span> <span class="kpi-time">${time}s</span></div>${eff?`<div class="kpi-rating rating-${esc(eff.rating)}">${esc(eff.rating)}</div>`:''}</div>`;
      });
      html += '</div>';

      html += `<div class="charts-row"><div class="chart-wrap"><canvas id="chart-tokens"></canvas></div><div class="chart-wrap"><canvas id="chart-pass"></canvas></div></div>`;

      html += `<div class="bk-section"><div class="bk-title">Comparaison</div><table class="bk-table"><thead><tr><th>Métrique</th>${configs.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('')}</tr></thead><tbody>`;
      [{label:'Tokens',key:'tokens',fmt:v=>Math.round(v).toLocaleString('fr-FR')},{label:'Pass rate',key:'pass_rate',fmt:v=>`${Math.round(v*100)}%`},{label:'Temps (s)',key:'time_seconds',fmt:v=>v.toFixed(1)}].forEach(row=>{
        html+=`<tr><td class="bk-label">${row.label}</td>${configs.map(cfg=>{const s=summary[cfg]?.[row.key]||{};return`<td>${row.fmt(s.mean||0)} <span class="bk-std">±${row.fmt(s.stddev||0)}</span></td>`;}).join('')}</tr>`;
      });
      const delta=summary.delta||{};
      const fd=Object.values(delta)[0];
      if(fd){html+=`<tr><td class="bk-label">Δ tokens</td><td colspan="${configs.length}"><span class="${fd.tokens?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(fd.tokens||'—')}</span> ${fd.rating?`<span class="rating-badge rating-${esc(fd.rating)}">${esc(fd.rating)}</span>`:''}</td></tr>`;}
      html += '</tbody></table></div>';

      if(Object.keys(efficiency).length){
        html+=`<div class="bk-section"><div class="bk-title">Token Efficiency</div><table class="bk-table"><thead><tr><th>Config</th><th>Réf.</th><th>Δ Tokens</th><th>Δ Pass Rate</th><th>Tok/point</th><th>Rating</th></tr></thead><tbody>`;
        Object.entries(efficiency).forEach(([cfg,eff])=>{
          html+=`<tr><td>${esc(cfg)}</td><td class="bk-label">${esc(eff.vs)}</td><td class="${eff.tokens_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.tokens_delta)}</td><td class="${eff.pass_rate_delta?.startsWith('-')?'delta-neg':'delta-pos'}">${esc(eff.pass_rate_delta)}</td><td>${eff.tokens_per_pass_rate_point?.toLocaleString('fr-FR')||'—'}</td><td class="rating-badge rating-${esc(eff.rating)}">${esc(eff.rating)}</td></tr>`;
        });
        html+='</tbody></table></div>';
      }

      if(notes.length){html+=`<div class="bk-section"><div class="bk-title">Observations</div><ul class="notes-list">${notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;}

      if(el) el.innerHTML = html;

      if(!chartsInit && typeof Chart !== 'undefined'){
        chartsInit = true;
        const labels=configs.map(c=>c.replace(/_/g,' '));
        const colors=['rgba(91,106,208,0.7)','rgba(199,123,123,0.7)','rgba(74,222,128,0.7)','rgba(251,191,36,0.7)'];
        const borders=['rgb(91,106,208)','rgb(199,123,123)','rgb(74,222,128)','rgb(251,191,36)'];
        const opts=(title)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#666'}},title:{display:true,text:title,color:'#f7f7f7',font:{size:12,weight:'normal'}}},scales:{x:{ticks:{color:'#555'},grid:{color:'#1a1a1a'}},y:{ticks:{color:'#555'},grid:{color:'#1a1a1a'}}}});
        new Chart(document.getElementById('chart-tokens'),{type:'bar',data:{labels,datasets:[{label:'Tokens',data:configs.map(c=>Math.round(summary[c]?.tokens?.mean||0)),backgroundColor:colors,borderColor:borders,borderWidth:1}]},options:opts('Tokens moyens')});
        new Chart(document.getElementById('chart-pass'),{type:'bar',data:{labels,datasets:[{label:'Pass Rate (%)',data:configs.map(c=>Math.round((summary[c]?.pass_rate?.mean||0)*100)),backgroundColor:colors,borderColor:borders,borderWidth:1}]},options:opts('Pass Rate (%)')});
      }
    }

    document.addEventListener('keydown', e => {
      if(modalIsOpen){ if(e.key==='Escape') closeModal(); return; }
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(e.key==='ArrowLeft'||e.key==='k') navigate(-1);
      if(e.key==='ArrowRight'||e.key==='j') navigate(1);
      if(e.key==='b'){ const bk=document.getElementById('tab-benchmark'); switchTab(bk?.classList.contains('hidden')?'benchmark':'outputs'); }
      if(e.key==='Escape') switchTab('outputs');
    });

    buildSidebar();
    renderCurrentEval();
    updateNavBar();
  </script>

</body>
</html>
